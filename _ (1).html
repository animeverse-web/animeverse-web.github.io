<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse | Admin Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #FF7B00; --bg: #0d0d12; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; overflow-x: hidden; }
        .glass { background: rgba(24, 28, 37, 0.7); backdrop-filter: blur(12px); border: 1px solid #2a2e38; border-radius: 16px; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; box-shadow: 0 0 15px rgba(255,123,0,0.3); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        canvas { max-height: 200px !important; }
        .rank-1 { color: #FF7B00; }
    </style>
</head>
<body class="p-4 lg:p-8 custom-scroll">

    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">ANIME<span class="text-[#FF7B00]">VERSE</span></h1>
            <p class="text-gray-500 text-[10px] tracking-widest uppercase">Live Data Control Center</p>
        </div>
        <div class="flex gap-4">
            <div class="glass px-5 py-2 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Total Interactions</p>
                <p id="total-engagement" class="text-xl font-bold text-[#FF7B00]">0</p>
            </div>
            <button onclick="location.reload()" class="glass px-6 py-2 hover:bg-[#FF7B00] hover:text-black transition font-bold text-xs uppercase">Refresh</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2 glass p-6">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-4">Engagement Chart (Global)</h3>
            <canvas id="popularityChart"></canvas>
        </div>
        <div class="glass p-6 flex flex-col justify-center items-center text-center">
            <div class="text-4xl mb-2">🚀</div>
            <h3 class="text-xs font-bold uppercase text-gray-400">Current Status</h3>
            <p class="text-green-400 font-bold text-sm mt-1 uppercase">Website Online</p>
            <p class="text-[10px] text-gray-600 mt-2 uppercase tracking-tighter">Monitoring 10-20 active users</p>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="openFolder('trending')" id="btn-trending" class="tab-btn active px-6 py-2 rounded-full text-[10px] font-black uppercase transition">🔥 Today's Top</button>
        <button onclick="openFolder('clicks')" id="btn-clicks" class="tab-btn px-6 py-2 rounded-full text-[10px] font-black uppercase transition">📊 Global Rank</button>
        <button onclick="openFolder('episodes')" id="btn-episodes" class="tab-btn px-6 py-2 rounded-full text-[10px] font-black uppercase transition">📁 Anime Folders</button>
        <button onclick="openFolder('comments')" id="btn-comments" class="tab-btn px-6 py-2 rounded-full text-[10px] font-black uppercase transition">💬 Moderation</button>
    </div>

    <div class="glass min-h-[450px] overflow-hidden mb-10">
        
        <div id="folder-trending" class="folder-content p-6">
            <h3 class="text-sm font-bold text-[#FF7B00] uppercase mb-6 tracking-widest italic">Live Trending (Last 24 Hours)</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] text-gray-500 uppercase border-b border-[#2a2e38]">
                        <tr>
                            <th class="pb-4">Rank</th>
                            <th class="pb-4">Anime Name & Episode</th>
                            <th class="pb-4 text-right">Today's Views</th>
                        </tr>
                    </thead>
                    <tbody id="trending-list-body" class="divide-y divide-[#1f232d]">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="folder-clicks" class="folder-content hidden p-6">
            <table class="w-full text-left">
                <thead class="text-[10px] text-gray-500 uppercase border-b border-[#2a2e38]">
                    <tr><th class="pb-4">Anime</th><th class="pb-4 text-right">Total Clicks</th></tr>
                </thead>
                <tbody id="clicks-tbody" class="divide-y divide-[#1f232d]"></tbody>
            </table>
        </div>

        <div id="folder-episodes" class="folder-content hidden p-6">
            <div id="anime-folders-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8"></div>
            <div id="ep-details-container" class="hidden bg-[#0d0d12] p-6 rounded-2xl border border-[#2a2e38]">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="selected-anime-name" class="text-lg font-black text-[#FF7B00] uppercase"></h3>
                    <button onclick="closeEpDetails()" class="text-[10px] uppercase font-bold text-gray-500 hover:text-white">Close X</button>
                </div>
                <div id="ep-list-table" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
            </div>
        </div>

        <div id="folder-comments" class="folder-content hidden p-6">
            <div id="comments-list" class="space-y-3"></div>
        </div>

    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE", 
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/", 
            projectId: "animeverse-9eada" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let chart;

        function openFolder(id) {
            document.querySelectorAll('.folder-content').forEach(f => f.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('folder-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
        }

        // FEATURE 1: AUTOMATIC TRENDING LOGIC
        db.ref('trending_today').on('value', snap => {
            const tbody = document.getElementById('trending-list-body');
            tbody.innerHTML = "";
            let items = [];
            const now = Date.now();
            const expiry = 24 * 60 * 60 * 1000;

            snap.forEach(child => {
                const data = child.val();
                if (now - data.createdAt > expiry) {
                    db.ref(`trending_today/${child.key}`).remove();
                } else {
                    items.push(data);
                }
            });

            items.sort((a, b) => b.count - a.count);
            items.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td class="py-4 font-black text-xl opacity-30">#${index+1}</td>
                        <td class="py-4">
                            <div class="font-bold text-sm uppercase ${index === 0 ? 'text-[#FF7B00]' : ''}">${item.animeName}</div>
                            <div class="text-[9px] text-gray-500 uppercase">${item.episode}</div>
                        </td>
                        <td class="py-4 text-right font-mono font-bold text-orange-400">${item.count}</td>
                    </tr>`;
            });
        });

        // FEATURE 2: GLOBAL CLICKS
        db.ref('global_clicks').on('value', snap => {
            const tbody = document.getElementById('clicks-tbody');
            tbody.innerHTML = "";
            let l = [], c = [], total = 0;
            snap.forEach(child => {
                const name = child.key.replace(/_/g, ' ');
                const val = child.val();
                total += val; l.push(name); c.push(val);
                tbody.innerHTML += `<tr><td class="py-4 text-xs font-bold uppercase text-gray-400">${name}</td><td class="py-4 text-right text-orange-500 font-bold">${val}</td></tr>`;
            });
            document.getElementById('total-engagement').innerText = total.toLocaleString();
            updateChart(l, c);
        });

        // FEATURE 3: FOLDERS
        db.ref('animeverse').on('value', snap => {
            const container = document.getElementById('anime-folders-container');
            container.innerHTML = "";
            snap.forEach(anime => {
                let views = 0;
                anime.forEach(ep => { views += (ep.val().total_clicks || 0); });
                container.innerHTML += `
                    <div onclick="showAnimeEps('${anime.key}')" class="glass p-4 cursor-pointer hover:border-[#FF7B00] transition group text-center">
                        <div class="text-xl mb-2">📁</div>
                        <h4 class="font-bold text-[9px] uppercase truncate group-hover:text-[#FF7B00]">${anime.key.replace(/_/g, ' ')}</h4>
                        <p class="text-[8px] text-gray-600 mt-1 uppercase tracking-tighter">${views} Total Views</p>
                    </div>`;
            });
        });

        function showAnimeEps(key) {
            const container = document.getElementById('ep-details-container');
            const list = document.getElementById('ep-list-table');
            container.classList.remove('hidden');
            document.getElementById('selected-anime-name').innerText = key.replace(/_/g, ' ');
            list.innerHTML = "";
            db.ref(`animeverse/${key}`).once('value', snap => {
                snap.forEach(ep => {
                    list.innerHTML += `<div class="bg-white/5 p-3 rounded-lg flex justify-between uppercase text-[10px]"><span>${ep.key}</span><span class="text-orange-500 font-bold">${ep.val().total_clicks || 0}</span></div>`;
                });
            });
            container.scrollIntoView({ behavior: 'smooth' });
        }
        function closeEpDetails() { document.getElementById('ep-details-container').classList.add('hidden'); }

        // FEATURE 4: MODERATION
        db.ref('comments').on('value', snap => {
            const list = document.getElementById('comments-list');
            list.innerHTML = "";
            snap.forEach(anime => {
                anime.forEach(ep => {
                    ep.forEach(msg => {
                        const m = msg.val();
                        list.innerHTML = `
                            <div class="glass p-4 flex justify-between items-center border-l-2 border-orange-500">
                                <div class="text-xs">
                                    <span class="text-orange-500 font-bold uppercase">${m.name}</span> <span class="text-[9px] text-gray-600 uppercase tracking-tighter italic">on ${anime.key}</span>
                                    <p class="mt-1 text-gray-300">"${m.text}"</p>
                                </div>
                                <button onclick="db.ref('comments/${anime.key}/${ep.key}/${msg.key}').remove()" class="text-red-500 font-bold hover:bg-red-500/10 px-3 py-1 rounded text-[10px]">DELETE</button>
                            </div>` + list.innerHTML;
                    });
                });
            });
        });

        function updateChart(l, c) {
            const ctx = document.getElementById('popularityChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: l,
                    datasets: [{ label: 'Clicks', data: c, backgroundColor: '#FF7B00', borderRadius: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444', font: { size: 9, weight: 'bold' } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
