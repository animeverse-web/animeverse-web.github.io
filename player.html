    <style>
        :root { --accent: #ff4757; --bg: #0f1014; --surface: #1e1f26; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .app-bar { 
            position: relative; width: 100%; z-index: 1000; 
            padding: 50px 20px 20px 20px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        
        /* Fixed Player Wrapper for Responsiveness */
        .player-wrapper { 
            width: calc(100% - 32px); 
            margin: 0 auto; 
            position: relative;
            background: #000; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); 
            border: 1px solid rgba(255,255,255,0.08); 
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ensure iframe and video take full size of parent */
        #main-player, #plyr-player, .plyr {
            width: 100% !important;
            height: 100% !important;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .error-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 25px; animation: fadeIn 0.4s ease-in-out;
            z-index: 10;
        }
        .error-icon { font-size: 38px; color: #ff4757; margin-bottom: 12px; filter: drop-shadow(0 0 8px rgba(255,71,87,0.5)); }
        .error-title { font-size: 13px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        .error-desc { font-size: 11px; color: #888; font-weight: 500; line-height: 1.6; max-width: 80%; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        #ep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        @media (min-width: 1024px) {
            #ep-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
            main { max-width: 1200px; margin: 0 auto !important; }
        }

        .ep-card { position: relative; border-radius: 12px; overflow: hidden; background: var(--surface); border: 1px solid var(--glass); transition: 0.3s; aspect-ratio: 16/9; }
        .ep-card.active { border-color: var(--accent); transform: scale(1.05); z-index: 2; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
        .ep-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.3s; }
        .ep-card.active .ep-img { opacity: 1; }
        
        .ep-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
        .ep-label { font-size: 7px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .ep-name { font-size: 8px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }

        .tab-btn { padding: 10px 22px; border-radius: 30px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid var(--glass); cursor: pointer; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
        .fab-download { position: fixed; bottom: 30px; right: 25px; width: 56px; height: 56px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.5); z-index: 100; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");

                    fetchTMDB(data.title);

            });

        async function loadEpisodeData() {
            const epKey = `E${currentEpNum}`;
            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            currentLinks = { srv1: "", srv2: "" };

            // SERVER 1 FETCH (animeverse_links)
            const s1Snap = await db.ref(`animeverse_links/${currentAnimeId}/${currentSeason}/${epKey}`).once('value');

            let finalUrl = (srvNum === 1) ? currentLinks.srv1 : currentLinks.srv2;

            if (!finalUrl) {
                plyrEl.style.display = 'none'; iframeEl.style.display = 'none'; errorEl.style.display = 'flex';

                return;

            errorEl.style.display = 'none';
            if (srvNum === 2) {
                // Server 2 (Animes/Hosting) hamesha iframe
                plyrEl.style.display = 'none'; iframeEl.style.display = 'block'; iframeEl.src = finalUrl;
            } else {
                // Server 1 purana logic
                if (finalUrl.includes('workers.dev') || finalUrl.includes('.mp4')) {
                    iframeEl.style.display = 'none'; plyrEl.style.display = 'block';
                    player.source = { type: 'video', sources: [{ src: finalUrl, type: 'video/mp4' }] };

                    plyrEl.style.display = 'none'; iframeEl.style.display = 'block'; iframeEl.src = finalUrl;

            }

            }
        }

        function updateUI(title, poster, year, desc) {
            document.getElementById('title').innerText = title;
            document.getElementById('poster').src = poster;
            document.getElementById('year').innerText = year;
            document.getElementById('desc').innerText = desc;
        }

        function setupSeasons() {
            const seasons = Object.keys(animeEpisodes).sort();
            document.getElementById('season-select').innerHTML = seasons.map(s => `<option value="${s}" ${s === currentSeason ? 'selected' : ''}>${s.replace('S', 'Season ')}</option>`).join('');
        }

        function renderEpisodes() {
            const episodes = animeEpisodes[currentSeason];
            if(!episodes) return;
            const grid = document.getElementById('ep-grid');
            grid.innerHTML = "";
            Object.keys(episodes).sort((a,b) => parseInt(a.replace('E','')) - parseInt(b.replace('E',''))).forEach(eKey => {
                const num = eKey.replace('E', '');
                grid.innerHTML += `<div class="ep-card ${num == currentEpNum ? 'active' : ''}" onclick="changeEpisode(${num})">
                    <img src="${globalPoster}" class="ep-img"><div class="ep-overlay"><div class="ep-label">EP ${num}</div></div>
                </div>`;
            });
        }

        function changeSeason(s) { currentSeason = s; currentEpNum = 1; loadEpisodeData(); }
        function changeEpisode(e) { currentEpNum = e; loadEpisodeData(); }

        init();
    </script>
</body>
</html>
