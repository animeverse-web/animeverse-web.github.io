<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnimeVerse | Premium Mobile Player</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff4757; --bg: #0f1014; --surface: #1e1f26; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Updated Header: Niche laya gaya aur margin badhaya gaya */
        .app-bar { 
            position: relative; width: 100%; z-index: 1000; 
            padding: 50px 20px 20px 20px; /* Top padding increased to push it down */
            display: flex; align-items: center; justify-content: space-between;
        }
        
        /* Video Section with Rounded Borders & Shadow */
        .player-wrapper { 
            width: calc(100% - 30px); margin: 0 auto; aspect-ratio: 16/9; 
            background: #000; border-radius: 24px; overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); 
            border: 1px solid rgba(255,255,255,0.08); 
            position: sticky; top: 15px; z-index: 50;
        }
        
        /* Episode Cards */
        .ep-card { 
            flex: 0 0 160px; position: relative; border-radius: 20px; 
            overflow: hidden; background: var(--surface);
            border: 1px solid var(--glass); transition: 0.3s;
        }
        .ep-card.active { border-color: var(--accent); transform: scale(1.02); box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2); }
        .ep-img { width: 100%; height: 90px; object-fit: cover; opacity: 0.5; transition: 0.3s; }
        .ep-card.active .ep-img { opacity: 1; }
        
        .ep-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 10px;
        }
        .ep-label { font-size: 8px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .ep-name { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }

        .tab-btn { padding: 10px 22px; border-radius: 30px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid var(--glass); }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }

        .fab-download { position: fixed; bottom: 30px; right: 25px; width: 56px; height: 56px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.5); z-index: 100; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-24">

    <!-- Header Section (Pushed down with padding) -->
    <header class="app-bar">
        <button onclick="window.history.back()" class="w-11 h-11 glass-card flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
        <div class="text-[12px] font-black tracking-[4px] uppercase italic">Anime<span class="text-[#ff4757]">Verse</span></div>
        <button onclick="alert('Report Sent!')" class="w-11 h-11 glass-card flex items-center justify-center"><i class="fas fa-flag text-xs text-red-500"></i></button>
    </header>

    <!-- Player with Border and Spacing -->
    <div class="player-wrapper">
        <video id="plyr-player" playsinline controls style="display:none;"></video>
        <iframe id="main-player" src="" allowfullscreen style="display:none; width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <main class="px-5 mt-8">
        <!-- Title & Stats -->
        <div class="flex items-start justify-between mb-8">
            <div class="flex-1 pr-4">
                <h1 id="title" class="text-2xl font-black uppercase leading-tight tracking-tighter mb-2">Anime Title</h1>
                <div class="flex items-center gap-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                    <span id="year">----</span>
                    <span class="text-white bg-[#ff4757] px-2 py-0.5 rounded-md">4K ULTRA</span>
                    <span><i class="fas fa-eye text-[#ff4757] mr-1"></i> <span id="ep-views">0</span></span>
                </div>
            </div>
            <img id="poster" src="" class="w-16 h-24 object-cover rounded-2xl shadow-2xl border border-white/10">
        </div>

        <!-- Episode Slider -->
        <div class="mb-10">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-[10px] font-black uppercase tracking-[3px] text-gray-500">Episodes List</h3>
                <select id="season-select" onchange="changeSeason(this.value)" class="bg-transparent text-[#ff4757] font-black text-[10px] outline-none uppercase"></select>
            </div>
            <div id="ep-grid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </div>

        <!-- Controls -->
        <div class="flex gap-3 mb-10">
            <button onclick="smartChange(-1)" class="glass-card flex-1 py-5 font-black text-[10px] uppercase tracking-widest"><i class="fas fa-arrow-left mr-2"></i> Prev</button>
            <button onclick="smartChange(1)" class="glass-card flex-1 py-5 font-black text-[10px] uppercase tracking-widest">Next <i class="fas fa-arrow-right ml-2"></i></button>
        </div>

        <!-- Synopsis & Discussion -->
        <div class="flex gap-2 mb-6">
            <button class="tab-btn active">Storyline</button>
            <button class="tab-btn">Comments</button>
        </div>
        <div id="desc" class="text-[13px] text-gray-400 leading-relaxed font-medium mb-10 italic">
            Connecting to secure servers...
        </div>

        <!-- Comments -->
        <div class="glass-card p-6">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6">User Chat</h3>
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="Your Name" class="w-full bg-black/30 border border-white/5 rounded-2xl px-5 py-4 text-xs outline-none focus:border-[#ff4757]/30">
                <textarea id="comment-text" placeholder="Share your thoughts..." rows="2" class="w-full bg-black/30 border border-white/5 rounded-2xl px-5 py-4 text-xs outline-none focus:border-[#ff4757]/30"></textarea>
                <button onclick="postComment()" class="w-full bg-[#ff4757] py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Post Comment</button>
            </div>
            <div id="comment-list" class="mt-8 space-y-4"></div>
        </div>
    </main>

    <button id="dl-button" class="fab-download"><i class="fas fa-download"></i></button>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE", 
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/", 
            projectId: "animeverse-9eada", 
            appId: "1:296666771306:web:df732df90b1e5e9108ff13" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = new Plyr('#plyr-player');
        const tmdbKey = "eef0f9c16ca61d6c843e7d43ddc5e1d8";

        let animeEpisodes = {}, currentAnimeId = "", currentEpNum = 1, currentSeason = "", tmdbId = "", globalPoster = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            currentAnimeId = params.get('id');
            currentSeason = params.get('s'); 
            currentEpNum = parseInt(params.get('ep') || 1);
            if(!currentAnimeId) return;

            db.ref(`animeverse_links/${currentAnimeId}`).on('value', snapshot => {
                animeEpisodes = snapshot.val();
                if(animeEpisodes) {
                    const seasons = Object.keys(animeEpisodes).sort();
                    if (!currentSeason || !animeEpisodes[currentSeason]) currentSeason = seasons[0];
                    setupSeasons();
                    loadEpisodeData();
                }
            });

            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            db.ref(`anime_details/${animeKey}`).once('value', snapshot => {
                const data = snapshot.val();
                if(data) {
                    globalPoster = data.poster;
                    updateUI(data.title, data.poster, data.year, data.desc);
                    fetchGlobalSync(data.title);
                } else fetchGlobalSync(currentAnimeId);
            });
        }

        async function fetchGlobalSync(query) {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&query=${query.replace(/-/g, ' ')}`);
            const data = await res.json();
            if(data.results?.[0]) {
                const r = data.results[0];
                tmdbId = r.id;
                if(!globalPoster) globalPoster = "https://image.tmdb.org/t/p/w500" + r.poster_path;
                updateUI(r.name || r.title, globalPoster, (r.first_air_date || r.release_date || "").split('-')[0], r.overview);
                renderEpisodes(); 
            }
        }

        function updateUI(title, poster, year, desc) {
            document.getElementById('title').innerText = title;
            document.getElementById('poster').src = poster;
            document.getElementById('year').innerText = year;
            document.getElementById('desc').innerText = desc;
        }

        function setupSeasons() {
            const seasons = Object.keys(animeEpisodes).sort();
            const select = document.getElementById('season-select');
            select.innerHTML = seasons.map(s => `<option value="${s}" ${s === currentSeason ? 'selected' : ''}>${s.replace('S', 'Season ')}</option>`).join('');
            renderEpisodes();
        }

        function renderEpisodes() {
            const episodes = animeEpisodes[currentSeason];
            if(!episodes) return;
            const grid = document.getElementById('ep-grid');
            const sortedEps = Object.keys(episodes).sort((a,b) => parseInt(a.replace('E','')) - parseInt(b.replace('E','')));
            
            grid.innerHTML = "";
            sortedEps.forEach(eKey => {
                const num = eKey.replace('E', '');
                const sNum = currentSeason.replace('S', '');
                const card = document.createElement('div');
                card.className = `ep-card ${num == currentEpNum ? 'active' : ''}`;
                card.onclick = () => changeEpisode(num);
                card.innerHTML = `
                    <img id="thumb-${num}" src="${globalPoster}" class="ep-img">
                    <div class="ep-overlay">
                        <div class="ep-label">EP ${num}</div>
                        <div id="name-${num}" class="ep-name">Streaming...</div>
                    </div>
                `;
                grid.appendChild(card);

                if(tmdbId) {
                    fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${sNum}/episode/${num}?api_key=${tmdbKey}`)
                    .then(r => r.json()).then(data => {
                        if(data.still_path) document.getElementById(`thumb-${num}`).src = "https://image.tmdb.org/t/p/w500" + data.still_path;
                        if(data.name) document.getElementById(`name-${num}`).innerText = data.name;
                    }).catch(() => { document.getElementById(`name-${num}`).innerText = "Play Episode"; });
                }
            });
        }

        function loadEpisodeData() {
            const epKey = `E${currentEpNum}`;
            const epData = animeEpisodes[currentSeason]?.[epKey];
            if(!epData) return;

            const plyrEl = document.getElementById('plyr-player');
            const iframeEl = document.getElementById('main-player');

            if (epData.url.includes('workers.dev') || epData.url.includes('.mp4')) {
                iframeEl.style.display = 'none'; plyrEl.style.display = 'block';
                player.source = { type: 'video', sources: [{ src: epData.url, type: 'video/mp4' }] };
            } else {
                plyrEl.style.display = 'none'; iframeEl.style.display = 'block'; iframeEl.src = epData.url;
            }

            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            const epViewKey = `${currentSeason}_E${currentEpNum}`;
            db.ref(`animeverse/${animeKey}/${epViewKey}/total_clicks`).transaction(c => (c || 0) + 1);
            db.ref(`animeverse/${animeKey}/${epViewKey}/total_clicks`).on('value', snap => {
                document.getElementById('ep-views').innerText = (snap.val() || 0).toLocaleString();
            });

            document.getElementById('dl-button').onclick = () => {
                window.location.href = `download.html?id=${currentAnimeId}_s${currentSeason.replace('S','')}_e${currentEpNum}`;
            };

            listenToComments(animeKey, epViewKey);
            window.history.pushState({}, '', `?id=${currentAnimeId}&s=${currentSeason}&ep=${currentEpNum}`);
            
            document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
            const active = document.querySelector(`.ep-card[onclick="changeEpisode(${currentEpNum})"]`);
            if(active) active.classList.add('active');
        }

        function postComment() {
            const name = document.getElementById('user-name').value || "Fan";
            const text = document.getElementById('comment-text').value;
            if(!text) return;
            db.ref(`comments/${currentAnimeId.replace(/[.#$[\]]/g, "_")}/${currentSeason}_E${currentEpNum}`).push({ name, text, time: Date.now() });
            document.getElementById('comment-text').value = "";
        }

        function listenToComments(ak, ek) {
            db.ref(`comments/${ak}/${ek}`).on('value', snap => {
                const list = document.getElementById('comment-list'); list.innerHTML = "";
                if(snap.val()) Object.values(snap.val()).reverse().forEach(c => {
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl"><p class="text-[9px] font-black text-[#ff4757] uppercase mb-1">${c.name}</p><p class="text-xs text-gray-400 font-medium">${c.text}</p></div>`;
                });
            });
        }

        function changeSeason(s) { currentSeason = s; currentEpNum = 1; loadEpisodeData(); renderEpisodes(); }
        function changeEpisode(e) { currentEpNum = e; loadEpisodeData(); renderEpisodes(); }
        function smartChange(dir) { changeEpisode(currentEpNum + dir); }

        init();
    </script>
</body>
</html>
