    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1e1e1e;
            --surface3: #252525;
            --accent: #f47521;
            --accent-dim: rgba(244,117,33,0.15);
            --accent-border: rgba(244,117,33,0.35);
            --text: #ffffff;
            --text-muted: #909090;
            --text-dim: #444;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --nav-h: 58px;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);
        }

        /* ─── HEADER ─── */
        .cr-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(13,13,13,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            z-index: 2000;
            border-bottom: 1px solid var(--border);
        }
        .cr-logo {
            font-size: 19px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .cr-logo span { color: var(--accent); }
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #aaa;
            font-size: 13px;
            text-decoration: none;
            touch-action: manipulation;
            transition: all 0.18s;
        }
        .icon-btn:active { background: var(--surface3); transform: scale(0.9); }
        .header-actions { display: flex; gap: 8px; align-items: center; }

        /* ─── VIDEO PLAYER ─── */
        .player-wrap {
            margin-top: 54px;
            width: 100%;
            background: #000;
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        .player-wrap iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }
        .player-loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #000;
            gap: 12px; z-index: 5;
        }
        .loader-spinner {
            width: 40px; height: 40px;
            border: 3px solid #222;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 10px; font-weight: 800; color: #555; letter-spacing: 0.5px; text-transform: uppercase; }
        .player-placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a;
            gap: 10px; text-align: center; padding: 24px;
        }
        .placeholder-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: var(--accent-dim);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: var(--accent);
        }
        .placeholder-text { font-size: 13px; font-weight: 800; color: #666; }
        .placeholder-sub { font-size: 10px; font-weight: 700; color: #333; margin-top: -2px; }

        /* ─── MAIN CONTENT ─── */
        .main-content { padding: 0; }

        /* ─── TITLE BLOCK ─── */
        .title-block {
            padding: 16px 16px 0;
            background: linear-gradient(180deg, rgba(244,117,33,0.04) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .now-playing-label {
            font-size: 9px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .now-playing-label::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        .anime-title {
            font-size: 17px;
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -0.3px;
            margin-bottom: 10px;
            color: #fff;
        }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
        }
        .meta-chip.accent {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: var(--accent);
        }
        .meta-chip i { font-size: 8px; }

        /* ─── ACTION BUTTONS ─── */
        .action-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 11px 6px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            touch-action: manipulation;
            color: var(--text-muted);
            transition: all 0.18s;
        }
        .action-btn:active { transform: scale(0.93); background: var(--surface3); }
        .action-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: var(--accent);
        }
        .action-btn i { font-size: 17px; }
        .action-btn span { font-size: 9px; font-weight: 800; letter-spacing: 0.2px; }

        /* ─── DESCRIPTION ─── */
        .desc-block {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        .desc-text {
            font-size: 12px;
            line-height: 1.7;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s;
        }
        .desc-text.expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
        .desc-toggle {
            font-size: 10px;
            font-weight: 900;
            color: var(--accent);
            margin-top: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* ─── SECTION ─── */
        .section {
            padding: 16px 16px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .section-label {
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ccc;
        }
        .section-label-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label-left::before {
            content: '';
            display: block;
            width: 3px; height: 13px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ─── SERVER TABS ─── */
        .server-tabs {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .server-tabs::-webkit-scrollbar { display: none; }
        .server-tab {
            flex-shrink: 0;
            padding: 7px 16px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1.5px solid var(--border2);
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .server-tab:active { transform: scale(0.94); }
        .server-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ─── SEASON TABS ─── */
        .season-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-tab {
            flex-shrink: 0;
            padding: 5px 14px;
            border-radius: 20px;
            background: var(--surface2);
            border: 1.5px solid var(--border2);
            font-size: 10px;
            font-weight: 900;
            color: var(--text-muted);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.18s;
            letter-spacing: 0.2px;
        }
        .season-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ─── EPISODE GRID - 3 COLUMN THUMBNAIL ─── */
        .ep-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 4px;
        }
        .ep-thumb-card {
            display: flex;
            flex-direction: column;
            background: var(--surface2);
            border: 1.5px solid var(--border2);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.18s;
        }
        .ep-thumb-card:active { transform: scale(0.96); }
        .ep-thumb-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(244,117,33,0.25); }
        .ep-thumb-img {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #111;
        }
        .ep-thumb-img img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .ep-thumb-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #181818;
        }
        .ep-thumb-num {
            position: absolute;
            bottom: 4px; left: 4px;
            background: rgba(0,0,0,0.82);
            color: #fff;
            font-size: 9px; font-weight: 900;
            width: 20px; height: 20px;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .ep-thumb-playing {
            position: absolute;
            inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(244,117,33,0.3);
        }
        .ep-thumb-playing i { font-size: 14px; color: #fff; }
        .ep-thumb-watched {
            position: absolute;
            top: 3px; right: 3px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
        }
        .ep-thumb-watched i { font-size: 7px; color: #fff; }
        .ep-thumb-label {
            padding: 5px 6px 6px;
            font-size: 9.5px;
            font-weight: 800;
            color: #aaa;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .ep-thumb-card.active .ep-thumb-label { color: var(--accent); }

        /* ─── EP CARD (large) ─── */
        .ep-card {
            display: flex; gap: 12px;
            padding: 10px; background: var(--surface2);
            border-radius: var(--radius); border: 1px solid var(--border);
            cursor: pointer; margin-bottom: 8px;
            touch-action: manipulation; transition: background 0.15s;
        }
        .ep-card:active { background: var(--surface3); }
        .ep-card.active { border-color: var(--accent); background: var(--accent-dim); }
        .ep-card-thumb {
            width: 100px; flex-shrink: 0;
            aspect-ratio: 16/9; border-radius: 6px;
            overflow: hidden; background: var(--surface); position: relative;
        }
        .ep-card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .ep-card-play {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .ep-card-play i { font-size: 16px; color: white; }
        .ep-card-info { flex: 1; min-width: 0; }
        .ep-card-num { font-size: 9px; font-weight: 900; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 3px; text-transform: uppercase; }
        .ep-card-title { font-size: 12px; font-weight: 800; color: #ddd; line-height: 1.3; margin-bottom: 3px;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-card-meta { font-size: 10px; font-weight: 700; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }

        /* ─── RELATED ANIME ─── */
        .related-grid {
            display: flex; gap: 10px;
            overflow-x: auto; padding-bottom: 4px;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .related-grid::-webkit-scrollbar { display: none; }
        .rel-card { flex-shrink: 0; width: 95px; cursor: pointer; }
        .rel-card:active .rel-img { transform: scale(0.94); }
        .rel-img {
            width: 100%; aspect-ratio: 2/3;
            border-radius: 8px; overflow: hidden;
            background: var(--surface2);
            transition: transform 0.15s;
            border-radius: 8px;
        }
        .rel-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .rel-title {
            font-size: 9.5px;
            font-weight: 700;
            color: #bbb;
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
        }

        /* ─── DOWNLOAD QUALITY POPUP ─── */
        #dl-popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 8000;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease;
        }
        #dl-popup-overlay.open {
            opacity: 1; pointer-events: all;
        }
        #dl-popup {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 18px 18px 0 0;
            width: 100%; max-width: 480px;
            padding: 0 0 calc(env(safe-area-inset-bottom) + 16px);
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        #dl-popup-overlay.open #dl-popup {
            transform: translateY(0);
        }
        .dl-popup-handle {
            width: 36px; height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 12px auto 0;
        }
        .dl-popup-title {
            font-size: 13px; font-weight: 900;
            color: var(--text);
            padding: 14px 18px 6px;
            letter-spacing: -0.2px;
        }
        .dl-popup-sub {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted);
            padding: 0 18px 14px;
        }
        .dl-divider { height: 1px; background: var(--border); margin: 0 0 10px; }
        .dl-quality-btn {
            display: flex; align-items: center;
            gap: 14px;
            width: 100%;
            padding: 13px 18px;
            background: none; border: none;
            cursor: pointer; font-family: 'Nunito', sans-serif;
            color: var(--text);
            transition: background 0.15s;
            text-align: left;
        }
        .dl-quality-btn:active { background: var(--surface2); }
        .dl-quality-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--accent);
            flex-shrink: 0;
        }
        .dl-quality-info { flex: 1; }
        .dl-quality-label {
            font-size: 13px; font-weight: 900;
            color: var(--text); line-height: 1.2;
        }
        .dl-quality-desc {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); margin-top: 1px;
        }
        .dl-quality-btn.unavailable { opacity: 0.35; pointer-events: none; }
        .dl-quality-btn.unavailable .dl-quality-icon {
            background: var(--surface2);
            border-color: var(--border2);
            color: var(--text-muted);
        }
        .dl-cancel-btn {
            display: flex; align-items: center; justify-content: center;
            width: calc(100% - 32px);
            margin: 6px 16px 0;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            font-size: 12px; font-weight: 900;
            color: var(--text-muted);
            cursor: pointer; font-family: 'Nunito', sans-serif;
            transition: background 0.15s;
        }
        .dl-cancel-btn:active { background: var(--surface3); }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 75px; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--surface3);
            border: 1px solid var(--border2);
            color: white;
            padding: 9px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            z-index: 9999;
            opacity: 0;
            transition: all 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
            background: rgba(13,13,13,0.98);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-around;
            padding-top: 9px;
            z-index: 3000;
        }
        .nav-item {
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            cursor: pointer; padding: 0 10px;
            color: #3a3a3a;
            text-decoration: none; min-width: 48px;
            touch-action: manipulation;
            transition: color 0.18s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-item:active { transform: scale(0.88); }

        /* ─── SKELETON ─── */
        .skeleton {
            background: linear-gradient(90deg, #161616 25%, #1e1e1e 50%, #161616 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        #skeleton-player { margin-top: 54px; width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 0; }
        #skeleton-info { padding: 16px 16px 0; }
        .sk-title { height: 18px; width: 65%; margin-bottom: 10px; }
        .sk-meta { height: 11px; width: 40%; margin-bottom: 16px; }
        .sk-ep { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
        .sk-ep-btn { aspect-ratio: 1; border-radius: 8px; }

        /* ─── ANIMATIONS ─── */
        .fade-in { animation: fadeUp 0.25s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ─── QUALITY BADGE ─── */
        .quality-badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 3px; padding: 2px 6px;
            font-size: 9px; font-weight: 900; color: white;
            backdrop-filter: blur(4px);
        }

        /* ─── EP PROGRESS ─── */
        .ep-progress-wrap { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
        .ep-progress-bar { height: 100%; background: var(--accent); border-radius: 1px; }

        /* ─── CUSTOM VIDEO PLAYER (Server 2) ─── */
        #custom-player-wrap {
            position: absolute; inset: 0;
            display: none;
            flex-direction: column;
            background: #000;
            z-index: 4;
        }
        #custom-player-wrap.active { display: flex; }
        #cv-video {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }
        /* Controls overlay */
        #cv-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.92));

    <script>
        // ─── FIREBASE INIT ───
        const firebaseConfig = {
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE",
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/",
            projectId: "animeverse-9eada",
            appId: "1:296666771306:web:df732df90b1e5e9108ff13"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TMDB_KEY = 'eef0f9c16ca61d6c843e7d43ddc5e1d8';

        // ─── STATE ───
        let animeSlug   = '';
        let animeTitle  = '';
        let animeData   = null;
        let allAnimeArr = [];
        let currentSeason  = 1;
        let currentEpisode = 1;
        let currentServer  = 1;   // 1 = animeverse_links, 2 = anime_links
        let currentQuality = '1080p';
        let totalSeasons   = 1;
        let totalEpisodes  = {};
        let watchedEps     = {};
        let posterUrl = '';
        let bannerUrl = '';

        // Firebase data stores
        // srv1Data['S1']['E1'] = { url, bot, time }
        // srv2Data['S1']['E1'] = { '1080p': {link, dl_link, server, time}, ... }
        let srv1Data = {};
        let srv2Data = {};

        // ─── URL PARAMS ───
        const params = new URLSearchParams(location.search);
        animeSlug = params.get('id') || '';

        // ─── CACHE HELPERS ───
        function getCachedAnime() {
            try { return JSON.parse(localStorage.getItem('av_cache') || '[]'); } catch(e) { return []; }
        }

        // ─── SHOW / HIDE ───
        function showContent() {
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('real-content').style.display = '';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ─── WATCHLIST ───
        function getWatchlist() {
            try { return JSON.parse(localStorage.getItem('my_watchlist') || '[]'); } catch(e) { return []; }
        }
        function updateWatchlistBtn() {
            const list = getWatchlist();
            const isIn = list.includes(animeTitle);
            const btn  = document.getElementById('btn-watchlist');
            const icon = document.getElementById('heart-icon');
            if (isIn) {
                btn.classList.add('active');
                icon.style.color = 'var(--accent)';
            } else {
                btn.classList.remove('active');
                icon.style.color = '';
            }
        }
        function toggleWatchlist() {
            let list = getWatchlist();
            if (list.includes(animeTitle)) {
                list = list.filter(x => x !== animeTitle);
                showToast('Removed from list');
            } else {
                list.push(animeTitle);
                showToast('Added to list ✓');
            }
            try { localStorage.setItem('my_watchlist', JSON.stringify(list)); } catch(e) {}
            updateWatchlistBtn();
        }

        // ─── WATCHED TRACKER ───
        function loadWatched() {
            try { watchedEps = JSON.parse(localStorage.getItem('watched_' + animeSlug) || '{}'); } catch(e) { watchedEps = {}; }
        }
        function markWatched(s, e) {
            watchedEps[`S${s}E${e}`] = true;
            try { localStorage.setItem('watched_' + animeSlug, JSON.stringify(watchedEps)); } catch(e) {}
        }
        function isWatched(s, e) { return !!watchedEps[`S${s}E${e}`]; }

        // ─── CONTINUE WATCHING ───
        function saveContinueWatching() {
            try {
                let cw = JSON.parse(localStorage.getItem('continue_watching') || '[]');
                cw = cw.filter(t => t !== animeTitle);
                cw.unshift(animeTitle);
                if (cw.length > 10) cw = cw.slice(0, 10);
                localStorage.setItem('continue_watching', JSON.stringify(cw));
                // Save episode progress
                localStorage.setItem('cw_ep_' + animeSlug, JSON.stringify({ s: currentSeason, e: currentEpisode }));
            } catch(e) {}
        }
        function getLastProgress() {
            try { return JSON.parse(localStorage.getItem('cw_ep_' + animeSlug) || 'null'); } catch(e) { return null; }
        }

        // ─── DESC TOGGLE ───
        let descExpanded = false;
        function toggleDesc() {
            descExpanded = !descExpanded;
            const el = document.getElementById('anime-desc');
            const toggle = document.getElementById('desc-toggle');
            el.classList.toggle('expanded', descExpanded);
            toggle.textContent = descExpanded ? 'Show less' : 'Show more';
        }

        // ─── LOAD BOTH FIREBASE SERVERS ───
        function loadFirebaseServers() {
            return new Promise((resolve) => {
                let done = 0;
                function check() { if (++done === 2) resolve(); }

                // SERVER 1 — animeverse_links/{slug}
                // Structure: S1 > E1 > { url, bot, time }
                db.ref('animeverse_links/' + animeSlug).once('value', snap => {
                    const data = snap.val();
                    if (data && typeof data === 'object') {
                        Object.entries(data).forEach(([sKey, eps]) => {
                            if (!sKey.startsWith('S') || typeof eps !== 'object') return;
                            srv1Data[sKey] = {};
                            Object.entries(eps).forEach(([eKey, epData]) => {
                                if (eKey.startsWith('E') && epData && typeof epData === 'object') {
                                    srv1Data[sKey][eKey] = epData;
                                }
                            });
                        });
                    }
                    check();
                }, () => check());

                // SERVER 2 — anime_links/{slug}
                // Structure: S1 > E1 > { '1080p': {link, dl_link, server, time}, '720p': {...}, '480p': {...} }
                db.ref('anime_links/' + animeSlug).once('value', snap => {
                    const data = snap.val();
                    if (data && typeof data === 'object') {
                        Object.entries(data).forEach(([sKey, eps]) => {
                            if (!sKey.startsWith('S') || typeof eps !== 'object') return;
                            srv2Data[sKey] = {};
                            Object.entries(eps).forEach(([eKey, qualities]) => {
                                if (eKey.startsWith('E') && qualities && typeof qualities === 'object') {
                                    srv2Data[sKey][eKey] = qualities;
                                }
                            });
                        });
                    }
                    check();
                }, () => check());
            });
        }

        // ─── BUILD SEASON/EP MAP from both servers (union) ───
        function buildSeasonMap() {
            const seasonSet = new Set();
            Object.keys(srv1Data).forEach(s => seasonSet.add(parseInt(s.replace('S',''))));
            Object.keys(srv2Data).forEach(s => seasonSet.add(parseInt(s.replace('S',''))));

            totalEpisodes = {};
            seasonSet.forEach(n => {
                const sKey = 'S' + n;
                const epSet = new Set();
                Object.keys(srv1Data[sKey] || {}).forEach(e => { if (e.startsWith('E')) epSet.add(parseInt(e.replace('E',''))); });
                Object.keys(srv2Data[sKey] || {}).forEach(e => { if (e.startsWith('E')) epSet.add(parseInt(e.replace('E',''))); });
                // Store max ep number
                const maxEp = epSet.size > 0 ? Math.max(...epSet) : 0;
                if (maxEp > 0) totalEpisodes[n] = maxEp;
            });

            totalSeasons = Object.keys(totalEpisodes).length;
        }

        // ─── RENDER SERVER TABS ───
        function renderServers() {
            const wrap = document.getElementById('server-tabs');
            const qualityHtml = currentServer === 2 ? `
                <div style="display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1.5px solid var(--accent-border);border-radius:6px;padding:6px 10px;height:36px;position:relative;">
                    <i class="fas fa-film" style="font-size:10px;color:var(--accent);flex-shrink:0;"></i>
                    <select id="quality-select" onchange="selectQuality(this.value)" style="background:transparent;border:none;outline:none;color:var(--accent);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:16px;">
                        <option value="1080p" ${currentQuality==='1080p'?'selected':''} style="background:#1e1e1e;color:#fff;">1080p</option>
                        <option value="720p"  ${currentQuality==='720p' ?'selected':''} style="background:#1e1e1e;color:#fff;">720p</option>
                        <option value="480p"  ${currentQuality==='480p' ?'selected':''} style="background:#1e1e1e;color:#fff;">480p</option>
                    </select>
                    <i class="fas fa-chevron-down" style="font-size:8px;color:var(--accent);pointer-events:none;position:absolute;right:10px;"></i>
                </div>` : '';
            wrap.innerHTML = `
                <div class="server-tab ${currentServer===1?'active':''}" onclick="selectServer(1)">
                    <i class="fas fa-play"></i> Server 1
                </div>
                <div class="server-tab ${currentServer===2?'active':''}" onclick="selectServer(2)">
                    <i class="fas fa-play"></i> Server 2
                </div>
                ${qualityHtml}`;
        }



        function selectServer(n) {
            currentServer = n;
            renderServers();
            renderEpisodes(true); // true = skip scroll
            loadVideo();
        }

        function selectQuality(q) {
            currentQuality = q;
            renderServers();
            loadVideo();
        }

        // ─── RENDER SEASON TABS ───
        function renderSeasons() {
            const wrap = document.getElementById('season-tabs');
            wrap.innerHTML = Object.keys(totalEpisodes).sort((a,b)=>a-b).map(s => `
                <div class="season-tab ${parseInt(s) === currentSeason ? 'active' : ''}" onclick="selectSeason(${s})">
                    Season ${s}
                </div>`).join('');
        }

        function selectSeason(s) {
            currentSeason = parseInt(s);
            currentEpisode = 1;
            renderSeasons();
            renderEpisodes();
            loadVideo();
            updateChips();
        }

        // ─── TMDB Episode Thumbnails Cache ───
        let tmdbEpCache = {}; // { 'S1E1': { thumb, name } }
        let tmdbShowId = null;

        async function fetchTmdbShowId(title) {
            if (tmdbShowId) return tmdbShowId;
            try {
                const r = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=en-US`);
                const d = await r.json();
                if (d.results?.[0]) { tmdbShowId = d.results[0].id; return tmdbShowId; }
            } catch(e) {}
            return null;
        }

        async function fetchTmdbSeasonEps(showId, season) {
            const cKey = `S${season}`;
            if (tmdbEpCache[cKey]) return;
            try {
                const r = await fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${season}?api_key=${TMDB_KEY}&language=en-US`);
                const d = await r.json();
                if (d.episodes) {
                    d.episodes.forEach(ep => {
                        const key = `S${season}E${ep.episode_number}`;
                        tmdbEpCache[key] = {
                            thumb: ep.still_path ? `https://image.tmdb.org/t/p/w300${ep.still_path}` : '',
                            name: ep.name || `Episode ${ep.episode_number}`
                        };
                    });
                    tmdbEpCache[cKey] = true;
                }
            } catch(e) {}
        }

        // ─── RENDER EPISODES ───
        function renderEpisodes(skipScroll) {
            const epCount = totalEpisodes[currentSeason] || 1;
            const sKey = 'S' + currentSeason;
            const primaryData = currentServer === 1 ? srv1Data : srv2Data;
            const grid = document.getElementById('ep-grid');

            // Build cards with placeholders first
            let html = '';
            for (let e = 1; e <= epCount; e++) {
                const eKey = 'E' + e;
                const hasData = !!(primaryData[sKey]?.[eKey]);
                const isActive = (e === currentEpisode);
                const isDone   = isWatched(currentSeason, e);
                const cacheKey = `S${currentSeason}E${e}`;
                const epInfo   = tmdbEpCache[cacheKey];
                const thumb    = epInfo?.thumb || '';
                const epName   = epInfo?.name  || '';
                const opacity  = '';
                const activeBorder = isActive ? 'border-color:var(--accent);box-shadow:0 0 0 2px rgba(244,117,33,0.3);' : '';

                html += `
                <div class="ep-thumb-card ${isActive?'active':''}" id="epcard-${e}" style="${opacity}${activeBorder}" onclick="selectEpisode(${e})">
                    <div class="ep-thumb-img" id="epimg-${e}">
                        ${thumb
                            ? `<img src="${thumb}" loading="lazy" onerror="this.style.display='none'">`
                            : `<div class="ep-thumb-placeholder"><i class="fas fa-play" style="font-size:14px;color:rgba(255,255,255,0.15);"></i></div>`
                        }
                        <div class="ep-thumb-num">${e}</div>
                        ${isActive ? `<div class="ep-thumb-playing"><i class="fas fa-play"></i></div>` : ''}
                    </div>
                    <div class="ep-thumb-label">${epName || 'Episode ' + e}</div>
                </div>`;
            }
            grid.innerHTML = html;

            setTimeout(() => {
                if (!skipScroll) {
                    const active = grid.querySelector('.ep-thumb-card.active');
                    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }, 100);

            // Fetch TMDB thumbnails async and update cards
            if (animeTitle) {
                fetchTmdbShowId(animeTitle).then(id => {
                    if (!id) return;
                    fetchTmdbSeasonEps(id, currentSeason).then(() => {
                        for (let e = 1; e <= epCount; e++) {
                            const cacheKey = `S${currentSeason}E${e}`;
                            const epInfo = tmdbEpCache[cacheKey];
                            if (!epInfo || typeof epInfo !== 'object') continue;
                            const imgDiv = document.getElementById(`epimg-${e}`);
                            const card   = document.getElementById(`epcard-${e}`);
                            if (!imgDiv || !card) continue;
                            const isAct = (e === currentEpisode);
                            imgDiv.innerHTML = `
                                ${epInfo.thumb ? `<img src="${epInfo.thumb}" loading="lazy" onerror="this.style.display='none'">` : `<div class="ep-thumb-placeholder"><i class="fas fa-play" style="font-size:14px;color:rgba(255,255,255,0.15);"></i></div>`}
                                <div class="ep-thumb-num">${e}</div>
                                ${isAct ? `<div class="ep-thumb-playing"><i class="fas fa-play"></i></div>` : ''}
                            `;
                            // Update label
                            const label = card.querySelector('.ep-thumb-label');
                            if (label && epInfo.name) label.textContent = epInfo.name;
                        }
                    });
                });
            }
        }

        function selectEpisode(e) {
            currentEpisode = e;
            saveContinueWatching();

            // ─── Auto-select server based on availability ───
            const sKey = 'S' + currentSeason;
            const eKey = 'E' + e;
            const inSrv1 = !!(srv1Data[sKey]?.[eKey]?.url);
            const inSrv2 = !!(srv2Data[sKey]?.[eKey]);

            if (inSrv1 && inSrv2) {
                // Dono mein hai — by default server 1, user ka current choice respect karo
                // (kuch mat badlo agar already valid server pe hai)
                if (currentServer !== 1 && currentServer !== 2) currentServer = 1;
            } else if (inSrv1 && !inSrv2) {
                currentServer = 1;
            } else if (inSrv2 && !inSrv1) {
                currentServer = 2;
            }
            // agar dono mein nahi → kuch mat badlo, loadVideo placeholder dikhayega

            renderServers();
            renderEpisodes();
            loadVideo();
            updateChips();

            document.getElementById('player-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });

        // ─── UPDATE META CHIPS ───
        function updateChips() {

            document.getElementById('chip-episode').textContent = `E${currentEpisode}`;

        // ─── LOAD VIDEO ───
        function loadVideo() {
            const sKey = 'S' + currentSeason;
            const eKey = 'E' + currentEpisode;

            const iframe      = document.getElementById('main-iframe');
            const loading     = document.getElementById('player-loading');
            const placeholder = document.getElementById('player-placeholder');
            const customWrap  = document.getElementById('custom-player-wrap');

            // Remove existing dl-bar if any
            let dlBar = document.getElementById('dl-bar-inline');
            if (dlBar) dlBar.remove();

            let videoUrl = null;
            let dlUrl    = null;
            let metaText = '';

            if (currentServer === 1) {
                const epData = srv1Data[sKey]?.[eKey];
                if (epData?.url) {
                    videoUrl = epData.url;
                    metaText = epData.bot ? 'Server 1 · ' + epData.bot : 'Server 1';
                }
            } else {
                const epData = srv2Data[sKey]?.[eKey];
                if (epData) {
                    const tryOrder = [currentQuality, '1080p', '720p', '480p'];
                    for (const q of tryOrder) {
                        if (epData[q]?.link) {
                            videoUrl = epData[q].link;
                            dlUrl    = epData[q].dl_link || null;
                            metaText = q + (epData[q].server ? ' · ' + epData[q].server : ' · Server 2');
                            break;
                        }
                    }
                }
            }

            if (!videoUrl) {
                // Hide everything
                iframe.style.display      = 'none';
                iframe.src                = '';
                loading.style.display     = 'none';
                customWrap.classList.remove('active');
                placeholder.style.display = 'flex';
                placeholder.querySelector('.placeholder-text').textContent = 'Not available on this server';
                placeholder.querySelector('.placeholder-sub').textContent  = 'Try another server or episode';
                showToast('⚠️ Episode nahi mila — dusra server try karo');
                return;
            }

            placeholder.style.display = 'none';

            // Decide: use custom player (Server 2 with direct link) or iframe (Server 1 / embed)
            const isDirectVideo = currentServer === 2 && (
                videoUrl.includes('.mp4') || videoUrl.includes('.m3u8') ||
                videoUrl.includes('.mkv') || videoUrl.includes('.webm') ||
                videoUrl.includes('googlevideo') || videoUrl.includes('drive.google')
            );

            if (currentServer === 2 && !isDirectVideo) {
                // Server 2 but embed link — use iframe fallback
                customWrap.classList.remove('active');
                loading.style.display     = 'flex';
                iframe.style.display      = 'none';
                iframe.src = videoUrl;
                iframe.onload = () => {
                    loading.style.display = 'none';
                    iframe.style.display  = 'block';
                };
                setTimeout(() => {
                    if (loading.style.display !== 'none') {
                        loading.style.display = 'none';
                        iframe.style.display  = 'block';
                    }
                }, 7000);
            } else if (currentServer === 2) {
                // Use dedicated HTML5 custom player
                iframe.style.display  = 'none';
                iframe.src            = '';
                loading.style.display = 'none';
                customWrap.classList.add('active');
                initCustomPlayer(videoUrl);
            } else {
                // Server 1 — iframe
                customWrap.classList.remove('active');
                loading.style.display     = 'flex';
                iframe.style.display      = 'none';
                iframe.src = videoUrl;
                iframe.onload = () => {
                    loading.style.display = 'none';
                    iframe.style.display  = 'block';
                };
                setTimeout(() => {
                    if (loading.style.display !== 'none') {
                        loading.style.display = 'none';
                        iframe.style.display  = 'block';
                    }
                }, 7000);
            }

            // Download link bar (Server 2 only)
            if (dlUrl) {
                const bar = document.createElement('div');
                bar.id = 'dl-bar-inline';
                bar.style.cssText = 'padding:0 16px 14px;';
                bar.innerHTML = `<a href="${dlUrl}" target="_blank" rel="noopener" style="
                    display:flex;align-items:center;justify-content:center;gap:8px;
                    width:100%;background:var(--surface2);
                    border:1.5px solid rgba(244,117,33,0.35);border-radius:8px;
                    padding:10px 0;font-size:12px;font-weight:800;
                    color:var(--accent);text-decoration:none;font-family:inherit;">
                    <i class="fas fa-download"></i> Download Episode (${metaText.split('·')[0].trim()})
                </a>`;
                const pw = document.getElementById('player-wrap');
                pw.parentNode.insertBefore(bar, pw.nextSibling);
            }
        }

        // ─── CUSTOM PLAYER LOGIC ───
        let cvControlsTimer = null;
        function initCustomPlayer(src) {
            const video    = document.getElementById('cv-video');
            const wrap     = document.getElementById('custom-player-wrap');
            const spinner  = document.getElementById('cv-spinner');
            const tapArea  = document.getElementById('cv-tap-area');

            // Reset and load new source
            video.pause();
            video.src = src;
            video.load();

            // Autoplay as soon as enough data is ready
            video.oncanplay = () => {
                spinner.style.display = 'none';
                video.play().catch(() => {});
            };

            // Show spinner while buffering
            spinner.style.display = 'flex';
            video.onwaiting = () => { spinner.style.display = 'flex'; };
            video.onplaying = () => { spinner.style.display = 'none'; };

            // Auto-show controls on start
            showCvControls();

            // ─ Play/Pause ─
            const btnPlay   = document.getElementById('cv-btn-play');
            const playIcon  = document.getElementById('cv-play-icon');
            const centerFa  = document.getElementById('cv-center-fa');
            const centerIco = document.getElementById('cv-center-icon');

            function updatePlayBtn() {
                if (video.paused) {
                    playIcon.className = 'fas fa-play';
                    centerFa.className = 'fas fa-play';
                } else {
                    playIcon.className = 'fas fa-pause';
                    centerFa.className = 'fas fa-pause';
                }
            }
            function popCenter() {
                updatePlayBtn();
                centerIco.classList.add('pop');
                setTimeout(() => centerIco.classList.remove('pop'), 600);
            }
            function togglePlay() {
                if (video.paused) { video.play().catch(()=>{}); }
                else { video.pause(); }
                popCenter();
                showCvControls();
            }
            btnPlay.onclick = togglePlay;
            tapArea.onclick = togglePlay;
            video.onplay  = updatePlayBtn;
            video.onpause = updatePlayBtn;

            // ─ Seek ─
            const progWrap = document.getElementById('cv-progress-wrap');
            const progBar  = document.getElementById('cv-progress');
            const bufBar   = document.getElementById('cv-buffered');
            const timeTip  = document.getElementById('cv-time-tip');
            const timeEl   = document.getElementById('cv-time');

            function fmtTime(s) {
                if (isNaN(s)) return '0:00';
                const h = Math.floor(s/3600);
                const m = Math.floor((s%3600)/60);
                const sec = Math.floor(s%60);
                if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
                return `${m}:${String(sec).padStart(2,'0')}`;
            }

            video.ontimeupdate = () => {
                if (!video.duration) return;
                const pct = video.currentTime / video.duration * 100;
                progBar.style.width = pct + '%';
                timeEl.textContent  = fmtTime(video.currentTime) + ' / ' + fmtTime(video.duration);
                // Buffer
                if (video.buffered.length > 0) {
                    const bPct = video.buffered.end(video.buffered.length-1) / video.duration * 100;
                    bufBar.style.width = bPct + '%';
                }
            };

            let seeking = false;
            function seekFromEvent(e) {
                const rect = progWrap.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                video.currentTime = pct * video.duration;
                progBar.style.width = (pct * 100) + '%';
                showCvControls();
            }
            function tipFromEvent(e) {
                if (!video.duration) return;
                const rect = progWrap.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                const t = pct * video.duration;
                timeTip.textContent  = fmtTime(t);
                timeTip.style.left   = (pct * 100) + '%';
                timeTip.style.display = 'block';
            }
            progWrap.addEventListener('mousedown',  e => { seeking = true; seekFromEvent(e); });
            progWrap.addEventListener('mousemove',  e => { tipFromEvent(e); if (seeking) seekFromEvent(e); });
            progWrap.addEventListener('mouseup',    () => { seeking = false; });
            progWrap.addEventListener('mouseleave', () => { seeking = false; timeTip.style.display='none'; });
            progWrap.addEventListener('touchstart', e => { seeking = true; seekFromEvent(e); }, {passive:true});
            progWrap.addEventListener('touchmove',  e => { tipFromEvent(e); if (seeking) seekFromEvent(e); }, {passive:true});
            progWrap.addEventListener('touchend',   () => { seeking = false; timeTip.style.display='none'; });

            // ─ Skip ─
            document.getElementById('cv-btn-back').onclick = () => { video.currentTime = Math.max(0, video.currentTime - 10); showCvControls(); };
            document.getElementById('cv-btn-fwd').onclick  = () => { video.currentTime = Math.min(video.duration||Infinity, video.currentTime + 10); showCvControls(); };

            // ─ Volume ─
            const volSlider = document.getElementById('cv-volume');
            const muteBtn   = document.getElementById('cv-btn-mute');
            const muteIcon  = document.getElementById('cv-mute-icon');
            const volWrap   = document.getElementById('cv-vol-wrap');

            muteBtn.onclick = () => {
                video.muted = !video.muted;
                updateVolIcon();
                volWrap.classList.toggle('open');
                showCvControls();
            };
            volSlider.oninput = () => {
                video.volume = parseFloat(volSlider.value);
                video.muted  = video.volume === 0;
                updateVolIcon();
                showCvControls();
            };
            function updateVolIcon() {
                if (video.muted || video.volume === 0) muteIcon.className = 'fas fa-volume-xmark';
                else if (video.volume < 0.5)           muteIcon.className = 'fas fa-volume-low';
                else                                   muteIcon.className = 'fas fa-volume-high';
                volSlider.value = video.muted ? 0 : video.volume;
            }

            // ─ Speed ─
            document.getElementById('cv-speed').onchange = e => {
                video.playbackRate = parseFloat(e.target.value);
                showCvControls();
            };

            // ─ PiP ─
            document.getElementById('cv-btn-pip').onclick = () => {
                if (document.pictureInPictureEnabled && video !== document.pictureInPictureElement) {
                    video.requestPictureInPicture().catch(()=>{});
                } else if (document.pictureInPictureElement) {
                    document.exitPictureInPicture().catch(()=>{});
                } else {
                    showToast('PiP not supported on this device');
                }
            };

            // ─ Fullscreen ─
            const fsBtn  = document.getElementById('cv-btn-fs');
            const fsIcon = document.getElementById('cv-fs-icon');
            fsBtn.onclick = () => {
                const el = wrap;
                if (!document.fullscreenElement) {
                    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el).catch(()=>{});
                } else {
                    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document).catch(()=>{});
                }
                showCvControls();
            };
            document.addEventListener('fullscreenchange', () => {
                fsIcon.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand';
            });

            // ─ Auto-hide controls ─
            function showCvControls() {
                wrap.classList.add('show-controls');
                clearTimeout(cvControlsTimer);
                if (!video.paused) {
                    cvControlsTimer = setTimeout(() => wrap.classList.remove('show-controls'), 3000);
                }
            }
            wrap.addEventListener('mousemove', showCvControls);
            wrap.addEventListener('touchstart', showCvControls, {passive:true});

            // ─ End ─
            video.onended = () => {
                updatePlayBtn();
                wrap.classList.add('show-controls');
            };
        }

        // ─── DOWNLOAD ───
        // ─── DOWNLOAD POPUP ───
        function openDlPopup() {
            const sKey = 'S' + currentSeason;
            const eKey = 'E' + currentEpisode;
            const epData = srv2Data[sKey]?.[eKey];

            const qualities = ['1080p', '720p', '480p'];
            const qualityMeta = {
                '1080p': { label: '1080p Full HD', icon: 'fa-film',   desc: 'Best quality · Large file' },
                '720p':  { label: '720p HD',       icon: 'fa-tv',     desc: 'Good quality · Medium file' },
                '480p':  { label: '480p SD',        icon: 'fa-mobile', desc: 'Data saver · Small file' },
            };

            document.getElementById('dl-popup-sub').textContent =
                `S${currentSeason} · E${currentEpisode} · ${animeTitle || 'Episode'}`;

            const list = document.getElementById('dl-quality-list');
            list.innerHTML = qualities.map(q => {
                const qData  = epData?.[q];
                const url    = qData?.dl_link || qData?.link || null;
                const meta   = qualityMeta[q];
                const unavail = !url ? 'unavailable' : '';
                return `
                <button class="dl-quality-btn ${unavail}" onclick="triggerDownload('${url}')">
                    <div class="dl-quality-icon"><i class="fas ${meta.icon}"></i></div>

        function closeDlPopup(e) {
            if (e && e.target !== document.getElementById('dl-popup-overlay')) return;
            document.getElementById('dl-popup-overlay').classList.remove('open');

        function triggerDownload(url) {
            if (!url || url === 'null') return;
            window.open(url, '_blank');
            showToast('Opening download...');
            document.getElementById('dl-popup-overlay').classList.remove('open');
        }

        function downloadEp() {
            const sKey = 'S' + currentSeason;
            const eKey = 'E' + currentEpisode;

            if (currentServer === 1) {
                // Server 1 → show quality popup using srv2Data links
                const epData = srv2Data[sKey]?.[eKey];
                const hasAny = epData && ['1080p','720p','480p'].some(q => epData[q]?.dl_link || epData[q]?.link);
                if (hasAny) {
                    openDlPopup();
                } else {
                    showToast('No download available');
                }
                return;
            }

            if (currentServer === 2) {
                const epData = srv2Data[sKey]?.[eKey];
                if (epData) {
                    const tryOrder = [currentQuality, '1080p', '720p', '480p'];
                    for (const q of tryOrder) {
                        if (epData[q]?.dl_link) {
                            window.open(epData[q].dl_link, '_blank');
                            showToast('Opening download...');
                            return;
                        }
                        if (epData[q]?.link) {
                            window.open(epData[q].link, '_blank');
                            showToast('Opening download...');
                            return;
                        }
                    }
                }
            }
            showToast('No download available');
        }

        // ─── FETCH META FROM KITSU ───
        async function fetchKitsuMeta(title) {
            try {
                const res = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(title)}&page[limit]=1`);
                const data = await res.json();
                if (data.data?.[0]) {
                    const attr = data.data[0].attributes;
                    return {
                        desc: attr.synopsis || '',
                        status: attr.status || '',
                        epCount: attr.episodeCount || null,
                        poster: attr.posterImage?.large || '',
                        banner: attr.coverImage?.large || '',
                    };
                }
            } catch(e) {}
            return null;
        }

        // ─── MAIN INIT ───
        async function initPlayer() {
            if (!animeSlug) {
                showToast('⚠️ No anime specified');
                showContent();
                return;
            }

            // Load from cache first (for title, poster, related)
            allAnimeArr = getCachedAnime();
            const cached = allAnimeArr.find(a => a.slug === animeSlug);
            if (cached) {
                animeTitle = cached.title;
                posterUrl  = cached.poster || '';
                bannerUrl  = cached.banner || '';
                document.getElementById('anime-title').textContent = animeTitle;
                document.getElementById('rating-val').textContent = cached.rating || '—';
                renderRelated();
                updateWatchlistBtn();
            }

            document.title = `AnimeVerse | ${animeTitle || animeSlug}`;

            // Load watched & progress
            loadWatched();
            const lastProg = getLastProgress();
            if (lastProg) {
                currentSeason  = lastProg.s || 1;
                currentEpisode = lastProg.e || 1;
            }

            // Load both Firebase server paths in parallel
            await loadFirebaseServers();
            buildSeasonMap();

            if (Object.keys(totalEpisodes).length === 0) {
                // fallback: try all_anime for title/meta, show empty state
                showContent();
                showToast('Episodes not found');
                return;
            }

            // Clamp currentSeason to available
            if (!totalEpisodes[currentSeason]) currentSeason = parseInt(Object.keys(totalEpisodes).sort((a,b)=>a-b)[0]);
            // Clamp currentEpisode
            if (currentEpisode > (totalEpisodes[currentSeason] || 1)) currentEpisode = 1;

            // Render UI
            renderServers();
            renderSeasons();
            renderEpisodes();
            updateChips();
            showContent();
            markWatched(currentSeason, currentEpisode);
            saveContinueWatching();
            loadVideo();
            updateWatchlistBtn();

            // Title from all_anime Firebase (if not cached)
            if (!animeTitle) {
                db.ref('all_anime').once('value', snap => {
                    const allData = snap.val();
                    if (!allData) return;
                    const matchTitle = Object.keys(allData).find(t =>
                        t.toLowerCase().replace(/ /g,'-').replace(/[:']/g,'') === animeSlug
                    );
                    if (matchTitle) {
                        animeTitle = matchTitle;
                        animeData  = allData[matchTitle];
                        document.getElementById('anime-title').textContent = animeTitle;
                        document.title = `AnimeVerse | ${animeTitle}`;
                        if (animeData?.status) document.getElementById('chip-status').textContent = animeData.status.toUpperCase();
                        updateWatchlistBtn();
                    }
                });
            }

            // Fetch Kitsu meta for description
            const kitsu = await fetchKitsuMeta(animeTitle || animeSlug.replace(/-/g,' '));
            if (kitsu) {
                document.getElementById('anime-desc').textContent = kitsu.desc || 'No description available.';
                if (kitsu.status) document.getElementById('chip-status').textContent = kitsu.status.toUpperCase();
            } else {
                document.getElementById('anime-desc').textContent = 'No description available.';
            }
            const descEl = document.getElementById('anime-desc');
            if (descEl.scrollHeight <= descEl.clientHeight + 4) {
                document.getElementById('desc-toggle').style.display = 'none';
            }

            // Timeout fallback for skeleton
            setTimeout(() => {
                if (document.getElementById('skeleton-loader').style.display !== 'none') {
                    showContent();
                }
            }, 5000);
        }

        initPlayer();
    </script>
</body>
</html>
