<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnimeVerse | Stream & Download</title>
    
    <meta property="og:type" content="video.other">
    <meta id="og-title" property="og:title" content="AnimeVerse - Watch Online">
    <meta id="og-desc" property="og:description" content="Stream and Download your favorite anime in Hindi/Sub.">
    <meta id="og-image" property="og:image" content="https://i.ibb.co/mF0pYxT/animeverse-logo.png"> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #FF7B00; --bg: #0D0D12; --card-bg: #181c25; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; touch-action: pan-x pan-y; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        .back-btn { background: #1c1f26; border: 1px solid #2a2e38; border-radius: 10px; padding: 8px 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .header-card { background: var(--card-bg); margin: 15px; padding: 15px; border-radius: 20px; display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .poster-img { width: 110px; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; background: #000; }
        
        .video-box { margin: 0 15px; position: relative; width: calc(100% - 30px); aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
        #main-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .plyr { width: 100%; height: 100%; }

        .nav-btn { flex: 1; background: #1c1f26; color: #fff; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 11px; text-transform: uppercase; border: 1px solid #2a2e38; text-align: center; cursor: pointer; }
        .btn-dl { background: var(--neon); color: #000; border: none; }

        .ep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; padding: 15px; }
        .ep-card { background: #181c25; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: 0.3s; cursor: pointer; position: relative; opacity: 0.6; }
        .ep-card.active { opacity: 1 !important; border-color: var(--neon); transform: scale(0.96); }
        .ep-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .badge-count { position: absolute; top: 4px; left: 4px; background: var(--neon); color: #000; font-size: 8px; font-weight: 900; padding: 2px 5px; border-radius: 4px; z-index: 10; }

        .comment-container { background: #181c25; margin: 15px; padding: 15px; border-radius: 20px; border: 1px solid #2a2e38; }
        .comment-input { width: 100%; background: #0d0d12; border: 1px solid #2a2e38; border-radius: 12px; padding: 12px; color: #fff; font-size: 14px; outline: none; margin-bottom: 8px; }
        .comment-btn { background: var(--neon); color: #000; font-weight: 800; padding: 10px 20px; border-radius: 10px; font-size: 12px; text-transform: uppercase; width: 100%; }
        
        .plyr--full-ui input[type=range] { color: var(--neon); }
        .plyr__control--overlaid { background: var(--neon); }
        .plyr--video .plyr__control:hover { background: var(--neon); }

        .footer-main { background: #0a0a0f; border-top: 1px solid #1a1a24; padding: 40px 20px; margin-top: 40px; }
        
         .disclaimer-box { background: rgba(255, 123, 0, 0.05); border: 1px dashed rgba(255, 123, 0, 0.3); margin: 20px 15px; padding: 15px; border-radius: 15px; text-align: center; }
        .disclaimer-title { font-size: 10px; font-weight: 900; color: #FF7B00; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .disclaimer-text { font-size: 10px; color: #666; line-height: 1.4; font-weight: 500; }

        footer { background: #000; padding: 40px 20px 100px; text-align: center; border-top: 1px solid #1a1a1a; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="p-5 flex items-center gap-4">
        <button class="back-btn" onclick="window.history.back()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="text-2xl font-black italic uppercase">ANIME<span class="text-[#FF7B00]">VERSE</span></div>
        <button onclick="reportBrokenLink()" class="ml-auto text-[8px] text-[#ff4444] border border-[#ff4444] px-2 py-1 rounded uppercase font-black">🚨 Report Error</button>
    </div>

    <div class="header-card">
        <img id="poster" src="./Gemini_Generated_Image_u4n26yu4n26yu4n2.png" class="poster-img" onerror="this.src='https://i.ibb.co/mF0pYxT/animeverse-logo.png'"> 
        <div class="flex-1">
            <h1 id="title" class="text-lg font-bold uppercase mb-2 line-clamp-2">Loading...</h1>
            <div class="flex items-center gap-3 mb-3">
                <span class="bg-[#2a2e38] text-[#FF7B00] text-[10px] font-bold px-2 py-1 rounded">Hindi / Sub</span>
                <span id="year" class="text-xs text-gray-500 font-bold">----</span>
                <span class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-400 font-bold">👁️ <span id="ep-views">0</span> VIEWS</span>
            </div>
            <p id="desc" class="text-[11px] text-gray-400 line-clamp-3 leading-relaxed">Fetching details...</p>
        </div>
    </div>

    <div class="video-box mb-4" id="video-container">
        <video id="plyr-player" playsinline controls style="display:none;"></video>
        <iframe id="main-player" src="" allowfullscreen style="display:none;"></iframe>
    </div>

    <div class="flex gap-2 px-[15px] mb-6">
        <button class="nav-btn" onclick="smartChange(-1)">Prev</button>
        <button id="dl-button" class="nav-btn btn-dl">Download Ep</button>
        <button class="nav-btn" onclick="smartChange(1)">Next</button>
    </div>

    <div class="px-[15px] mb-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-black uppercase tracking-[3px] text-gray-600">Episodes List</h3>
            <select id="season-select" onchange="changeSeason(this.value)" class="bg-transparent text-[#FF7B00] font-bold text-xs outline-none cursor-pointer"></select>
        </div>
        <div id="ep-grid" class="ep-grid"></div>
    </div>

    <div class="comment-container">
        <h3 class="text-[10px] font-black uppercase tracking-[2px] text-gray-500 mb-4">Live Comments</h3>
        <input type="text" id="user-name" placeholder="Name" class="comment-input">
        <textarea id="comment-text" placeholder="Share your thoughts..." class="comment-input" rows="2"></textarea>
        <button onclick="postComment()" class="comment-btn">Post Comment</button>
        <div id="comment-list" class="mt-6"></div>
    </div>

    <footer class="footer-main text-center">
        <div class="text-2xl font-black italic uppercase mb-4">ANIME<span class="text-[#FF7B00]">VERSE</span></div>
        
    <div class="disclaimer-box">
        <p class="disclaimer-text">AnimeVerse does not store any files. All contents are provided by non-affiliated third parties.</p>
    </div>
     <div class="text-[9px] text-gray-700 font-bold uppercase">© 2026 AnimeVerse</div>
</footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE", 
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/", 
            projectId: "animeverse-9eada", 
            appId: "1:296666771306:web:df732df90b1e5e9108ff13" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const player = new Plyr('#plyr-player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
        });

        const csvURL = "https://docs.google.com/spreadsheets/d/1VLcid14lgDfdDvYzfJLpLsbgD_jpY1CGzutgpEGhZdA/export?format=csv";
        const tmdbKey = "eef0f9c16ca61d6c843e7d43ddc5e1d8";
        const defaultLogo = "https://i.ibb.co/mF0pYxT/animeverse-logo.png";
        
        let allData = [], seasons = [], currentAnimeId = "", currentEpIndex = 0, currentSeason = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            currentAnimeId = params.get('id');
            currentSeason = params.get('s') || "S1";
            currentEpIndex = parseInt(params.get('ep') || 1) - 1;

            if(!currentAnimeId) return;

            // FIX: Using anime_details to prevent double entry on home page
            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            db.ref(`anime_details/${animeKey}`).once('value', snapshot => {
                const data = snapshot.val();
                if(data && data.desc) {
                    updateUI(data.title, data.poster, data.year || "2026", data.desc);
                } else {
                    fetchTMDBData(currentAnimeId);
                }
            });

            try {
                const res = await fetch(csvURL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                allData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { id: c[0]?.trim(), name: c[1]?.trim(), url: c[2]?.trim(), bot: c[3]?.trim() };
                }).filter(x => x.id === currentAnimeId);

                seasons = [...new Set(allData.map(x => x.name.split(' - ')[0]))];
                document.getElementById('season-select').innerHTML = seasons.map(s => `<option value="${s}" ${s===currentSeason?'selected':''}>${s.replace('S','Season ')}</option>`).join('');
                
                renderEpisodes();
                loadEpisodeData();
            } catch(e) { console.error("CSV Loading Error"); }
        }

        async function fetchTMDBData(id) {
            const query = id.replace(/-/g, ' ');
            try {
                const tmRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&query=${encodeURIComponent(query)}`);
                const tmData = await tmRes.json();
                if(tmData.results?.[0]) {
                    const r = tmData.results[0];
                    const details = {
                        title: r.name || r.title,
                        poster: "https://image.tmdb.org/t/p/w500" + r.poster_path,
                        year: (r.first_air_date || r.release_date || "").split('-')[0],
                        desc: r.overview
                    };
                    updateUI(details.title, details.poster, details.year, details.desc);
                    // FIX: Save to details folder
                    db.ref(`anime_details/${id.replace(/[.#$[\]]/g, "_")}`).update(details);
                } else {
                    fetchKitsuData(id, query);
                }
            } catch(e) { fetchKitsuData(id, query); }
        }

        async function fetchKitsuData(id, query) {
            try {
                const res = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data.data?.[0]) {
                    const a = data.data[0].attributes;
                    const details = {
                        title: a.canonicalTitle,
                        poster: a.posterImage.large,
                        year: (a.startDate || "").split('-')[0],
                        desc: a.synopsis
                    };
                    updateUI(details.title, details.poster, details.year, details.desc);
                    // FIX: Save to details folder
                    db.ref(`anime_details/${id.replace(/[.#$[\]]/g, "_")}`).update(details);
                }
            } catch(e) {}
        }

        function updateUI(title, poster, year, desc) {
            document.getElementById('title').innerText = title;
            document.getElementById('poster').src = poster || defaultLogo;
            document.getElementById('year').innerText = year;
            document.getElementById('desc').innerText = desc || "Streaming available on AnimeVerse.";
            renderEpisodes();
        }

        function loadEpisodeData() {
            const filtered = allData.filter(x => x.name.startsWith(currentSeason));
            const ep = filtered[currentEpIndex];
            if(!ep) return;

            const plyrEl = document.getElementById('plyr-player');
            const iframeEl = document.getElementById('main-player');

            if (ep.url.includes('workers.dev') || ep.url.includes('.mp4') || ep.url.includes('.mkv')) {
                iframeEl.style.display = 'none';
                plyrEl.style.display = 'block';
                player.source = { type: 'video', sources: [{ src: ep.url, type: 'video/mp4' }] };
            } else {
                plyrEl.style.display = 'none';
                iframeEl.style.display = 'block';
                iframeEl.src = ep.url;
            }

            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            const cleanS = currentSeason.replace(/\D/g,'') || "1";
            const epKey = `S${cleanS}_E${currentEpIndex + 1}`;

            updateTrendingToday(currentAnimeId, epKey);

            db.ref(`animeverse/${animeKey}/${epKey}/total_clicks`).transaction(c => (c || 0) + 1);
            db.ref(`animeverse/${animeKey}/${epKey}/total_clicks`).on('value', snap => {
                document.getElementById('ep-views').innerText = (snap.val() || 0).toLocaleString();
            });

            document.getElementById('dl-button').onclick = () => {
                if(ep.bot && ep.bot !== "" && ep.bot !== "#") {
                    window.open(ep.bot.startsWith("http") ? ep.bot : `https://t.me/verse1_8bot?start=${ep.bot}`, '_blank');
                } else {
                    window.location.href = `download.html?id=${currentAnimeId}_s${cleanS}_e${currentEpIndex + 1}`;
                }
            };
            listenToComments(animeKey, epKey);
        }

        function updateTrendingToday(anime, ep) {
            const trendId = (anime + "-" + ep).replace(/[.#$[\]\s]/g, "_");
            db.ref(`trending_today/${trendId}`).transaction((curr) => {
                if (curr) { curr.count++; return curr; }
                return { animeName: anime.replace(/-/g, ' ').toUpperCase(), episode: ep, count: 1, createdAt: Date.now() };
            });
        }

        function renderEpisodes() {
            const filtered = allData.filter(x => x.name.startsWith(currentSeason));
            const grid = document.getElementById('ep-grid');
            grid.innerHTML = filtered.map((ep, i) => `
                <div class="ep-card ${i === currentEpIndex ? 'active' : ''}" onclick="window.location.href='?id=${currentAnimeId}&s=${currentSeason}&ep=${i+1}'">
                    <div class="badge-count">${i+1}</div>
                    <img src="${document.getElementById('poster').src}" class="ep-img" onerror="this.src='${defaultLogo}'">
                    <p class="text-[9px] font-bold p-2 truncate">Episode ${i+1}</p>
                </div>
            `).join('');
        }

        function postComment() {
            const name = document.getElementById('user-name').value.trim() || "User";
            const text = document.getElementById('comment-text').value.trim();
            if(!text) return;
            const animeKey = currentAnimeId.replace(/[.#$[\]]/g, "_");
            const epKey = `S${currentSeason.replace(/\D/g,'')}_E${currentEpIndex + 1}`;
            db.ref(`comments/${animeKey}/${epKey}`).push({ name, text, timestamp: Date.now() });
            document.getElementById('comment-text').value = "";
        }

        function listenToComments(animeKey, epKey) {
            db.ref(`comments/${animeKey}/${epKey}`).on('value', snap => {
                const list = document.getElementById('comment-list'); list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(c => {
                        list.innerHTML += `<div class="mb-4 flex gap-3"><div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center text-[10px] font-bold text-orange-500">${c.name.charAt(0)}</div><div class="flex-1"><h4 class="text-[11px] font-bold text-gray-300">${c.name}</h4><p class="text-xs text-gray-500">${c.text}</p></div></div>`;
                    });
                }
            });
        }

        function changeSeason(s) { window.location.href = `?id=${currentAnimeId}&s=${s}&ep=1`; }
        function smartChange(dir) {
            const filtered = allData.filter(x => x.name.startsWith(currentSeason));
            const newEp = (currentEpIndex + 1) + dir;
            if(newEp >= 1 && newEp <= filtered.length) window.location.href = `?id=${currentAnimeId}&s=${currentSeason}&ep=${newEp}`;
        }

        function reportBrokenLink() {
            const info = `${currentAnimeId} | ${currentSeason} | Ep ${currentEpIndex + 1}`;
            db.ref('reports').push({ anime: info, time: new Date().toLocaleString(), status: "Broken Link" });
            alert("Bhai, report bhej di hai! Admin jald check karega.");
        }

        init();
    </script>
</body>
</html>
