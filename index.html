    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE", 
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/", 
            projectId: "animeverse-9eada", 
            appId: "1:296666771306:web:df732df90b1e5e9108ff13" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ═══════════════════════════════════════════════════
        // API ORDER: 1) Jikan (MyAnimeList) → 2) Kitsu → 3) AniList
        // TMDB completely removed
        // ═══════════════════════════════════════════════════

        let allAnimeData = [];
        let featuredData = null;
        let autoScrollInterval = null;
        let resumeTimeout = null;

        const getCache = () => {
            try { return JSON.parse(localStorage.getItem('av_cache') || '[]'); } 
            catch(e) { localStorage.removeItem('av_cache'); return []; }
        };
        const setCache = (data) => { try { localStorage.setItem('av_cache', JSON.stringify(data)); } catch(e) {} };

        function clearCache() {
            localStorage.removeItem('av_cache');
            localStorage.removeItem('my_watchlist');
            showToast('🔄 Refreshing...');
            setTimeout(() => location.reload(), 800);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ── API 1: Jikan v4 (MyAnimeList) — Best quality anime images ──
        async function fetchFromJikan(title) {
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1&sfw=true`);
                if (!res.ok) throw new Error('Jikan error');
                const data = await res.json();
                const anime = data.data?.[0];
                if (anime) {
                    const poster = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url;
                    // Use trailer/cover as banner, fallback to poster
                    const banner = anime.trailer?.images?.maximum_image_url 
                                || anime.images?.jpg?.large_image_url 
                                || poster;
                    const rating = anime.score ? anime.score.toFixed(1) : null;
                    if (poster) {
                        return { p: poster, b: banner, r: rating || '7.5', source: 'jikan' };
                    }
                }
            } catch(e) { console.warn('Jikan failed for:', title, e.message); }
            return null;
        }

        // ── API 2: Kitsu — Good anime database ──
        async function fetchFromKitsu(title) {
            try {
                const res = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(title)}&page[limit]=1`);
                if (!res.ok) throw new Error('Kitsu error');
                const data = await res.json();
                const anime = data.data?.[0];
                if (anime) {
                    const attr = anime.attributes;
                    const poster = attr.posterImage?.large || attr.posterImage?.original;
                    const banner = attr.coverImage?.large || attr.coverImage?.original || poster;
                    const rating = attr.averageRating ? (parseFloat(attr.averageRating) / 10).toFixed(1) : null;
                    if (poster) {
                        return { p: poster, b: banner, r: rating || '7.5', source: 'kitsu' };
                    }
                }
            } catch(e) { console.warn('Kitsu failed for:', title, e.message); }
            return null;
        }

        // ── API 3: AniList (GraphQL) — Large database, high quality ──
        async function fetchFromAniList(title) {
            try {
                const query = `
                    query ($search: String) {
                        Media(search: $search, type: ANIME) {
                            title { romaji english }
                            coverImage { extraLarge large }
                            bannerImage
                            averageScore
                        }
                    }
                `;
                const res = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { search: title } })
                });
                if (!res.ok) throw new Error('AniList error');
                const data = await res.json();
                const anime = data.data?.Media;
                if (anime) {
                    const poster = anime.coverImage?.extraLarge || anime.coverImage?.large;
                    const banner = anime.bannerImage || poster;
                    const rating = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : null;
                    if (poster) {
                        return { p: poster, b: banner, r: rating || '7.5', source: 'anilist' };
                    }
                }
            } catch(e) { console.warn('AniList failed for:', title, e.message); }
            return null;
        }

        // ── Main fetchMeta: try all 3 APIs in order ──
        async function fetchMeta(title) {
            // API 1: Jikan (best for anime — direct MAL data)
            const jikan = await fetchFromJikan(title);
            if (jikan) return jikan;

            // API 2: Kitsu fallback
            const kitsu = await fetchFromKitsu(title);
            if (kitsu) return kitsu;

            // API 3: AniList fallback
            const anilist = await fetchFromAniList(title);
            if (anilist) return anilist;

            // All APIs failed — return placeholder
            const encoded = encodeURIComponent(title.substring(0, 20));
            return { 
                p: `https://placehold.co/500x750/1e1f26/ff4757?text=${encoded}`, 
                b: `https://placehold.co/1000x500/1e1f26/ff4757?text=${encoded}`, 
                r: '7.0',
                source: 'placeholder'
            };
        }

        async function initApp() {
            const skeletonTimeout = setTimeout(() => {
                const skeleton = document.getElementById('skeleton-loader');
                const content = document.getElementById('real-content');
                if (!skeleton.classList.contains('hidden')) {
                    skeleton.classList.add('hidden');
                    content.classList.remove('hidden');
                    showToast('⚠️ Slow connection. Try refreshing.');
                }
            }, 10000);

            const cache = getCache();
            if (cache.length > 0) {
                allAnimeData = cache;
                renderUIAndShow();
                clearTimeout(skeletonTimeout);
            }

            try {
                db.ref('all_anime').on('value', async (snap) => {
                    clearTimeout(skeletonTimeout);
                    const data = snap.val(); 
                    
                    if (!data) {
                        document.getElementById('skeleton-loader').classList.add('hidden');
                        document.getElementById('real-content').classList.remove('hidden');
                        return;
                    }

                    const titles = Object.keys(data);
                    
                    const freshData = await Promise.all(titles.map(async (title) => {
                        const existing = allAnimeData.find(a => a.title === title);
                        if (existing && existing.poster && !existing.poster.includes('placeholder') && !existing.poster.includes('placehold')) {
                            return { ...existing, item: data[title] };
                        }
                        const meta = await fetchMeta(title);
                        return { 
                            title, item: data[title], 
                            slug: title.toLowerCase().replace(/ /g, '-').replace(/[:']/g, ''), 
                            poster: meta.p, banner: meta.b, rating: meta.r 
                        };
                    }));

                    allAnimeData = freshData;
                    setCache(allAnimeData);
                    renderUIAndShow();
                }, (error) => {
                    clearTimeout(skeletonTimeout);
                    console.error("Firebase error:", error);
                    document.getElementById('skeleton-loader').classList.add('hidden');
                    document.getElementById('real-content').classList.remove('hidden');
                    showToast('⚠️ Data load failed. Try refreshing.');
                });
            } catch(e) {
                clearTimeout(skeletonTimeout);
                console.error("Firebase init error:", e);
                document.getElementById('skeleton-loader').classList.add('hidden');
                document.getElementById('real-content').classList.remove('hidden');
            }
        }

        function renderUIAndShow() {
            document.getElementById('skeleton-loader').classList.add('hidden');
            document.getElementById('real-content').classList.remove('hidden');

            if (allAnimeData.length === 0) return;
            
            if(!featuredData) featuredData = allAnimeData[Math.floor(Math.random() * allAnimeData.length)];
            
            const featImg = document.getElementById('featured-img');
            if (featuredData.banner || featuredData.poster) {
                featImg.src = featuredData.banner || featuredData.poster;
                featImg.onerror = () => { featImg.src = featuredData.poster || ''; };
            }
            document.getElementById('featured-title').innerText = featuredData.title;
            document.getElementById('featured-rating').innerHTML = `<i class="fas fa-star text-white"></i> ${featuredData.rating}`;
            document.getElementById('featured-section').onclick = () => openInfoModal(featuredData.title, featuredData.slug, featuredData.banner, featuredData.rating);
            document.getElementById('featured-play').onclick = (e) => { e.stopPropagation(); location.href = `player.html?id=${featuredData.slug}`; };

            renderGrids();
        }

        function renderGrids() {
            const series = document.getElementById('series-grid'), movies = document.getElementById('movies-grid'), 
                  carousel = document.getElementById('auto-scroll-container'), watchlistArea = document.getElementById('watchlist-items');
            
            series.innerHTML = ''; movies.innerHTML = ''; carousel.innerHTML = ''; watchlistArea.innerHTML = '';
            
            let watchlist = [];
            try { watchlist = JSON.parse(localStorage.getItem('my_watchlist') || '[]'); } catch(e) { watchlist = []; }

            watchlist.forEach(t => {
                const a = allAnimeData.find(i => i.title === t);
                if(a) {
                    watchlistArea.innerHTML += `
                        <div class="flex-shrink-0 text-center space-y-2 cursor-pointer active-scale" onclick="openInfoModal('${a.title.replace(/'/g, "\\'")}', '${a.slug}', '${a.banner}', '${a.rating}')">
                            <div class="w-16 h-16 rounded-full border-2 border-[#ff4757] p-0.5 shadow-xl"><img src="${a.poster}" class="w-full h-full rounded-full object-cover" onerror="this.src='https://placehold.co/64x64/1e1f26/ff4757?text=?'"></div>
                            <p class="text-[9px] w-16 truncate text-gray-400 font-bold">${t}</p>
                        </div>`;
                }
            });

            const slotsToFill = Math.max(0, 5 - watchlist.length);
            for(let i=0; i<slotsToFill; i++) {
                watchlistArea.innerHTML += `<div class="flex-shrink-0 text-center space-y-2 opacity-40"><div class="dotted-slot"><i class="fas fa-plus text-gray-600 text-xs"></i></div><p class="text-[8px] text-gray-700 font-black uppercase tracking-widest">Empty</p></div>`;
            }

            const shuffledForYou = shuffleArray([...allAnimeData]);

            allAnimeData.forEach(({title, item, slug, poster, banner, rating}) => {
                const isLiked = watchlist.includes(title), cat = item?.category?.toLowerCase() || '', safeTitle = title.replace(/'/g, "\\'");
                const card = `
                    <div class="relative group flex flex-col cursor-pointer active-scale anime-card" onclick="openInfoModal('${safeTitle}', '${slug}', '${banner}', '${rating}')">
                        <div class="relative overflow-hidden rounded-[26px] shadow-2xl">
                            <img src="${poster}" class="anime-poster w-full group-hover:scale-110 transition duration-500" onerror="this.src='https://placehold.co/500x750/1e1f26/ff4757?text=${encodeURIComponent(title.substring(0,10))}'">
                            <div class="absolute top-3 left-3 rating-chip px-2 py-1 rounded-lg text-[9px] text-white flex items-center gap-1 shadow-md"><i class="fas fa-star text-yellow-400"></i> ${rating}</div>
                            <button onclick="event.stopPropagation(); toggleWatchlist('${safeTitle}')" class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-black/40 backdrop-blur-md border border-white/10 z-10"><i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-regular text-white'} text-xs"></i></button>
                        </div>
                        <h4 class="text-[11px] font-black mt-4 truncate text-gray-400 px-1 uppercase tracking-tighter">${title}</h4>
                    </div>`;

                if (cat.includes('series') || cat === '' || cat.includes('latest')) series.innerHTML += card;
                if (cat.includes('movie')) movies.innerHTML += `<div class="bg-[#1e1f26] rounded-[35px] p-4 border border-white/5 active-scale" onclick="openInfoModal('${safeTitle}', '${slug}', '${banner}', '${rating}')"><div class="relative overflow-hidden rounded-2xl h-52"><img src="${poster}" class="w-full h-full object-cover shadow-lg" onerror="this.src='https://placehold.co/500x750/1e1f26/ff4757?text=${encodeURIComponent(title.substring(0,10))}'"><div class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-black/40 backdrop-blur-md border border-white/10"><i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-regular text-white'} text-xs"></i></div></div><h4 class="text-xs font-black truncate mt-4 text-gray-200">${title}</h4></div>`;
            });

            shuffledForYou.forEach(({title, item, slug, poster, banner, rating}) => {
                const isLiked = watchlist.includes(title), cat = item?.category?.toLowerCase() || '', safeTitle = title.replace(/'/g, "\\'");
                if (cat.includes('trending') || cat.includes('popular')) {
                    carousel.innerHTML += `<div class="w-36 flex-shrink-0 trending-item">
                        <div class="relative group flex flex-col cursor-pointer active-scale anime-card" onclick="openInfoModal('${safeTitle}', '${slug}', '${banner}', '${rating}')">
                            <div class="relative overflow-hidden rounded-[26px] shadow-2xl">
                                <img src="${poster}" class="anime-poster w-full group-hover:scale-110 transition duration-500" onerror="this.src='https://placehold.co/500x750/1e1f26/ff4757?text=${encodeURIComponent(title.substring(0,10))}'">
                                <div class="absolute top-3 left-3 rating-chip px-2 py-1 rounded-lg text-[9px] text-white flex items-center gap-1 shadow-md"><i class="fas fa-star text-yellow-400"></i> ${rating}</div>
                            </div>
                            <h4 class="text-[11px] font-black mt-4 truncate text-gray-400 px-1 uppercase tracking-tighter">${title}</h4>
                        </div>
                    </div>`;
                }
            });

            initInfiniteAutoScroll(carousel);
        }

        function initInfiniteAutoScroll(container) {
            if (autoScrollInterval) clearInterval(autoScrollInterval);
            
            const trendingItems = container.querySelectorAll('.trending-item');
            if (trendingItems.length <= 1) return;

            trendingItems.forEach(item => {
                const clone = item.cloneNode(true);
                container.appendChild(clone);
            });

            const startScrolling = () => {
                autoScrollInterval = setInterval(() => {
                    const cardWidth = 144 + 20;
                    const maxScroll = container.scrollWidth / 2;
                    if (container.scrollLeft >= maxScroll) {
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = 0;
                        container.style.scrollBehavior = 'smooth';
                        setTimeout(() => { container.scrollLeft += cardWidth; }, 50);
                    } else {
                        container.scrollLeft += cardWidth;
                    }
                }, 1500);
            };

            const handleUserInteraction = () => {
                clearInterval(autoScrollInterval);
                clearTimeout(resumeTimeout);
                resumeTimeout = setTimeout(startScrolling, 3000);
            };

            container.addEventListener('touchstart', handleUserInteraction, {passive: true});
            container.addEventListener('mousedown', handleUserInteraction);
            container.addEventListener('wheel', handleUserInteraction, {passive: true});

            startScrolling();
        }

        async function openInfoModal(title, slug, banner, rating) {
            document.body.classList.add('modal-open');
            const modal = document.getElementById('info-modal'), content = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-status').innerText = '';
            
            const bannerImg = document.getElementById('modal-banner');
            bannerImg.src = banner || '';
            bannerImg.onerror = () => { bannerImg.src = `https://placehold.co/800x400/1e1f26/ff4757?text=${encodeURIComponent(title.substring(0,15))}`; };

            document.getElementById('modal-rating').innerHTML = `<i class="fas fa-star text-white text-[9px]"></i> ${rating}`;
            document.getElementById('modal-desc').innerText = "Loading details...";
            
            document.getElementById('modal-play-btn').onclick = () => location.href = `player.html?id=${slug}`;
            
            const updateFavBtn = (t) => {
                let watchlist = [];
                try { watchlist = JSON.parse(localStorage.getItem('my_watchlist') || '[]'); } catch(e) {}
                const isLiked = watchlist.includes(t);
                document.getElementById('modal-fav-btn').innerHTML = `<i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-solid text-white'}"></i>`;
                document.getElementById('modal-fav-btn').onclick = () => { toggleWatchlist(t); updateFavBtn(t); };
            };
            updateFavBtn(title);

            modal.classList.add('modal-visible');
            setTimeout(() => { modal.classList.add('opacity-100'); content.classList.remove('translate-y-full'); }, 10);

            // Modal detail: Jikan se synopsis lo (best quality)
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1&sfw=true`);
                const data = await res.json();
                const anime = data.data?.[0];
                if (anime) {
                    document.getElementById('modal-desc').innerText = anime.synopsis || "No description available.";
                    const status = anime.status || '';
                    document.getElementById('modal-status').innerText = status.toUpperCase();
                } else {
                    // Fallback to Kitsu for description
                    const kRes = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(title)}&page[limit]=1`);
                    const kData = await kRes.json();
                    if (kData.data?.[0]) {
                        const attr = kData.data[0].attributes;
                        document.getElementById('modal-desc').innerText = attr.synopsis || "No description available.";
                        document.getElementById('modal-status').innerText = attr.status ? attr.status.toUpperCase() : '';
                    } else {
                        document.getElementById('modal-desc').innerText = "No description available.";
                    }
                }
            } catch (e) { 
                document.getElementById('modal-desc').innerText = "Could not load details.";
            }
        }

        function closeInfoModal() {
            document.body.classList.remove('modal-open');
            const modal = document.getElementById('info-modal'), content = document.getElementById('modal-content');
            modal.classList.remove('opacity-100');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.remove('modal-visible'), 400);
        }

        function toggleWatchlist(t) {
            let l = [];
            try { l = JSON.parse(localStorage.getItem('my_watchlist') || '[]'); } catch(e) {}
            if (l.includes(t)) {
                l = l.filter(x => x !== t);
                showToast('❤️ Removed from list');
            } else {
                l.push(t);
                showToast('✅ Added to list');
            }
            try { localStorage.setItem('my_watchlist', JSON.stringify(l)); } catch(e) {}
            renderGrids();
        }

        function handleSearch(q) {
            const box = document.getElementById('search-suggestions'), term = q.toLowerCase().trim();
            if(!term) { box.classList.add('hidden'); return; }
            const matches = allAnimeData.filter(a => a.title.toLowerCase().includes(term));
            if(matches.length > 0) {
                box.innerHTML = matches.map(a => `<div class="flex items-center gap-5 p-5 border-b border-white/5 cursor-pointer" onclick="openInfoModal('${a.title.replace(/'/g, "\\'")}', '${a.slug}', '${a.banner}', '${a.rating}')"><img src="${a.poster}" class="w-12 h-16 rounded-lg object-cover" onerror="this.src='https://placehold.co/48x64/1e1f26/ff4757?text=?'"><div class="flex-1"><p class="text-xs font-black text-gray-200 uppercase">${a.title}</p></div><i class="fas fa-info-circle text-[#ff4757]"></i></div>`).join('');
                box.classList.remove('hidden');
            } else { 
                box.innerHTML = `<div class="p-8 text-center text-gray-600 font-black text-[10px] uppercase">No Result Found</div>`; 
                box.classList.remove('hidden'); 
            }
        }

        function toggleSearch() {
            const b = document.getElementById('search-box');
            if(b.classList.contains('hidden')) { 
                b.classList.remove('hidden'); 
                setTimeout(() => { b.classList.add('opacity-100'); b.classList.remove('-translate-y-6'); }, 10); 
                document.getElementById('searchInput').focus(); 
            } else { 
                b.classList.remove('opacity-100'); 
                b.classList.add('-translate-y-6'); 
                setTimeout(() => b.classList.add('hidden'), 400); 
            }
        }

        initApp();
    </script>
</body>
