<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeVerse | Premium Optimized</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --app-bg: #0f1014; --accent: #ff4757; --surface: #1e1f26; }
        body { background-color: var(--app-bg); color: #ffffff; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .app-header { background: rgba(15, 16, 20, 0.95); backdrop-filter: blur(25px); z-index: 2000; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .bottom-nav { background: rgba(30, 31, 38, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 85px; padding-bottom: env(safe-area-inset-bottom); }

        .skeleton { background: linear-gradient(90deg, #1e1f26 25%, #2a2b35 50%, #1e1f26 75%); background-size: 200% 100%; animation: skeleton-loading 1.6s infinite linear; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #search-box { position: fixed; top: 85px; left: 0; width: 100%; z-index: 2500; padding: 0 15px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .search-input-wrapper { background: #1e1f26; border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); display: flex; align-items: center; overflow: hidden; }
        .search-input-wrapper:focus-within { border-color: var(--accent); }
        #searchInput { width: 100%; background: transparent; padding: 22px 25px; font-size: 16px; font-weight: 600; outline: none; color: white; }
        #search-suggestions { background: #1e1f26; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; margin-top: 15px; max-height: 480px; overflow-y: auto; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); }

        .dotted-slot { width: 62px; height: 62px; border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .anime-poster { aspect-ratio: 2/3; border-radius: 26px; object-fit: cover; }
        .rating-chip { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .featured-gradient { background: linear-gradient(to top, #0f1014 10%, rgba(15,16,20,0.5) 50%, transparent 100%); }
        .active-scale:active { transform: scale(0.94); }
        body.modal-open { overflow: hidden; }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="app-header fixed top-0 w-full px-6 py-4 flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-tight">Anime<span class="text-[#ff4757]">Verse</span></h1>
            <p class="text-[8px] font-bold text-gray-500 tracking-[0.2em] uppercase">Premium Streaming</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleSearch()" class="bg-white/5 w-11 h-11 rounded-full flex items-center justify-center border border-white/10 active-scale">
                <i class="fas fa-search text-gray-300"></i>
            </button>
            <div class="w-11 h-11 rounded-full border-2 border-[#ff4757] p-0.5 shadow-lg">
                <img src="https://ui-avatars.com/api/?name=AV&background=ff4757&color=fff" class="rounded-full w-full h-full">
            </div>
        </div>
    </header>

    <!-- Search System -->
    <div id="search-box" class="hidden opacity-0 transform -translate-y-6">
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Search anime..." autocomplete="off">
            <div class="pr-6 flex items-center">
                <i class="fas fa-times-circle text-gray-500 text-2xl cursor-pointer hover:text-[#ff4757]" onclick="toggleSearch()"></i>
            </div>
        </div>
        <div id="search-suggestions" class="hidden no-scrollbar"></div>
    </div>

    <!-- Main Content -->
    <main class="mt-28 px-5 space-y-12">
        <!-- Skeleton Loading -->
        <div id="skeleton-loader" class="space-y-12">
            <div class="flex gap-4"><div class="w-16 h-16 rounded-full skeleton flex-shrink-0"></div><div class="w-16 h-16 rounded-full skeleton flex-shrink-0"></div></div>
            <div class="h-72 w-full rounded-[40px] skeleton"></div>
        </div>

        <div id="real-content" class="hidden space-y-12">
            <!-- Watchlist Stories -->
            <section class="flex gap-4 overflow-x-auto no-scrollbar py-2">
                <div id="stories-container" class="flex gap-5 items-center">
                    <div class="flex-shrink-0 text-center space-y-2 cursor-pointer active-scale" onclick="toggleSearch()">
                        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#ff4757] to-[#ff6b81] flex items-center justify-center border-2 border-white/10 shadow-lg">
                            <i class="fas fa-plus text-white text-xl"></i>
                        </div>
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">My List</p>
                    </div>
                    <div id="watchlist-items" class="flex gap-5"></div>
                </div>
            </section>

            <!-- Featured Banner -->
            <section id="featured-section" class="relative h-72 rounded-[40px] overflow-hidden shadow-2xl border border-white/5 group">
                <img id="featured-img" class="absolute inset-0 w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                <div class="absolute inset-0 featured-gradient p-8 flex flex-col justify-end">
                    <div class="flex gap-3 items-center mb-4">
                        <span class="text-[10px] font-black bg-[#ff4757] px-3 py-1.5 rounded-lg tracking-widest uppercase">Featured Today</span>
                        <span id="featured-rating" class="rating-chip text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-white"></span>
                    </div>
                    <h2 id="featured-title" class="text-3xl font-black mb-6 drop-shadow-2xl line-clamp-2 leading-tight"></h2>
                    <button id="featured-play" class="w-max bg-white text-black px-8 py-3.5 rounded-2xl text-[11px] font-black flex items-center gap-2 shadow-xl active-scale">
                        <i class="fas fa-play"></i> WATCH NOW
                    </button>
                </div>
            </section>

            <!-- Categories -->
            <section>
                <h3 class="text-xl font-black mb-6 flex items-center gap-3"><span class="w-1.5 h-7 bg-[#ff4757] rounded-full"></span> For You</h3>
                <div id="auto-scroll-container" class="flex overflow-x-auto no-scrollbar gap-5 w-full py-2"></div>
            </section>
            
            <section><h3 class="text-xl font-black mb-6 px-1">Must Watch Series</h3><div id="series-grid" class="grid grid-cols-3 gap-4"></div></section>
            <section class="pb-16"><h3 class="text-xl font-black mb-6 px-1">Latest Movies</h3><div id="movies-grid" class="grid grid-cols-2 gap-3"></div></section>
        </div>
    </main>

    <!-- Info Modal -->
    <div id="info-modal" class="fixed inset-0 z-[5000] hidden items-end justify-center px-4 pb-10 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onclick="closeInfoModal()"></div>
        <div id="modal-content" class="relative w-full max-w-lg bg-[#1e1f26] rounded-[40px] overflow-hidden shadow-2xl border border-white/10 transform translate-y-full transition-transform duration-500">
            <div class="relative h-60">
                <img id="modal-banner" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#1e1f26] via-transparent to-transparent"></div>
                <button onclick="closeInfoModal()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-black/50 backdrop-blur-xl flex items-center justify-center border border-white/10 text-white active-scale"><i class="fas fa-times"></i></button>
            </div>
            <div class="px-8 pb-12 -mt-12 relative">
                <h2 id="modal-title" class="text-3xl font-black leading-tight mb-4 uppercase tracking-tighter"></h2>
                <div class="flex gap-3 mb-6">
                    <span id="modal-rating" class="bg-[#ff4757] text-white text-[11px] font-black px-3 py-1 rounded shadow-lg"></span>
                    <span id="modal-status" class="bg-white/5 text-gray-400 text-[11px] font-bold px-3 py-1 rounded border border-white/5"></span>
                </div>
                <p id="modal-desc" class="text-gray-400 text-[13px] leading-relaxed mb-8 line-clamp-4 font-medium"></p>
                <div class="flex gap-4">
                    <button id="modal-play-btn" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-[12px] flex items-center justify-center gap-3 shadow-xl active-scale"><i class="fas fa-play text-[#ff4757]"></i> PLAY</button>
                    <button id="modal-fav-btn" class="w-14 h-14 rounded-2xl bg-[#ff4757]/10 border border-[#ff4757]/30 flex items-center justify-center text-xl text-[#ff4757] active-scale"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="bottom-nav fixed bottom-0 w-full flex justify-between items-center px-12 z-[3000]">
        <a href="index.html" class="flex flex-col items-center gap-2 text-[#ff4757]"><i class="fas fa-th-large text-2xl"></i><span class="text-[9px] font-black uppercase">Browse</span></a>
        <a href="#" class="flex flex-col items-center gap-2 text-gray-500"><i class="fas fa-heart text-2xl"></i><span class="text-[9px] font-black uppercase">List</span></a>
        <a href="https://t.me/animeverse648" class="flex flex-col items-center gap-2 text-gray-500"><i class="fab fa-telegram-plane text-2xl"></i><span class="text-[9px] font-black uppercase">Join</span></a>
    </nav>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAe5XKQlowY_AroKkQ80SeAYPqLnF02KoE", 
            databaseURL: "https://animeverse-9eada-default-rtdb.firebaseio.com/", 
            projectId: "animeverse-9eada", 
            appId: "1:296666771306:web:df732df90b1e5e9108ff13" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TMDB_KEY = 'eef0f9c16ca61d6c843e7d43ddc5e1d8';

        let allAnimeData = [];
        let featuredData = null;

        // --- FAST CACHE LOGIC ---
        const getCache = () => JSON.parse(localStorage.getItem('av_cache') || '[]');
        const setCache = (data) => localStorage.setItem('av_cache', JSON.stringify(data));

        async function fetchMeta(title) {
            const query = encodeURIComponent(title);
            try {
                // TMDB (Fastest & Best Posters)
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${query}`);
                const tmdb = await tmdbRes.json();
                if (tmdb.results?.[0]?.poster_path) {
                    return { 
                        p: 'https://image.tmdb.org/t/p/w500' + tmdb.results[0].poster_path, 
                        b: 'https://image.tmdb.org/t/p/original' + (tmdb.results[0].backdrop_path || tmdb.results[0].poster_path), 
                        r: tmdb.results[0].vote_average?.toFixed(1) || '8.0' 
                    };
                }
                
                // KITSU FALLBACK (Replaced Jikan)
                const kitsuRes = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${query}&page[limit]=1`);
                const kitsu = await kitsuRes.json();
                if (kitsu.data?.[0]) {
                    const attr = kitsu.data[0].attributes;
                    return { 
                        p: attr.posterImage?.large || attr.posterImage?.original, 
                        b: attr.coverImage?.large || attr.posterImage?.large, 
                        r: attr.averageRating ? (attr.averageRating / 10).toFixed(1) : '7.5' 
                    };
                }
            } catch (e) { console.error("Meta fail:", title); }
            return { p: 'https://via.placeholder.com/500x750', b: 'https://via.placeholder.com/1000x500', r: '7.0' };
        }

        async function initApp() {
            // Step 1: Load from cache immediately
            const cache = getCache();
            if (cache.length > 0) {
                allAnimeData = cache;
                renderUIAndShow();
            }

            // Step 2: Fetch background update from Firebase
            db.ref('all_anime').on('value', async (snap) => {
                const data = snap.val(); if (!data) return;
                const titles = Object.keys(data);
                
                // Parallel Loading Logic
                const freshData = await Promise.all(titles.map(async (title) => {
                    const existing = allAnimeData.find(a => a.title === title);
                    if (existing && existing.poster && !existing.poster.includes('placeholder')) {
                        return { ...existing, item: data[title] };
                    }
                    const meta = await fetchMeta(title);
                    return { 
                        title, item: data[title], 
                        slug: title.toLowerCase().replace(/ /g, '-').replace(/[:']/g, ''), 
                        poster: meta.p, banner: meta.b, rating: meta.r 
                    };
                }));

                allAnimeData = freshData;
                setCache(allAnimeData);
                renderUIAndShow();
            });
        }

        function renderUIAndShow() {
            if (allAnimeData.length === 0) return;
            
            // Render Featured
            if(!featuredData) featuredData = allAnimeData[Math.floor(Math.random() * allAnimeData.length)];
            document.getElementById('featured-img').src = featuredData.banner || featuredData.poster;
            document.getElementById('featured-title').innerText = featuredData.title;
            document.getElementById('featured-rating').innerHTML = `<i class="fas fa-star text-white"></i> ${featuredData.rating}`;
            document.getElementById('featured-section').onclick = () => openInfoModal(featuredData.title, featuredData.slug, featuredData.banner, featuredData.rating);
            document.getElementById('featured-play').onclick = (e) => { e.stopPropagation(); location.href = `player.html?id=${featuredData.slug}`; };

            document.getElementById('skeleton-loader').classList.add('hidden');
            document.getElementById('real-content').classList.remove('hidden');
            renderGrids();
        }

        function renderGrids() {
            const series = document.getElementById('series-grid'), movies = document.getElementById('movies-grid'), 
                  carousel = document.getElementById('auto-scroll-container'), watchlistArea = document.getElementById('watchlist-items');
            
            series.innerHTML = ''; movies.innerHTML = ''; carousel.innerHTML = ''; watchlistArea.innerHTML = '';
            const watchlist = JSON.parse(localStorage.getItem('my_watchlist') || '[]');

            // Render Watchlist
            watchlist.forEach(t => {
                const a = allAnimeData.find(i => i.title === t);
                if(a) {
                    watchlistArea.innerHTML += `
                        <div class="flex-shrink-0 text-center space-y-2 cursor-pointer active-scale" onclick="openInfoModal('${a.title.replace(/'/g, "\\'")}', '${a.slug}', '${a.banner}', '${a.rating}')">
                            <div class="w-16 h-16 rounded-full border-2 border-[#ff4757] p-0.5 shadow-xl"><img src="${a.poster}" class="w-full h-full rounded-full object-cover"></div>
                            <p class="text-[9px] w-16 truncate text-gray-400 font-bold">${t}</p>
                        </div>`;
                }
            });

            const slotsToFill = Math.max(0, 5 - watchlist.length);
            for(let i=0; i<slotsToFill; i++) {
                watchlistArea.innerHTML += `<div class="flex-shrink-0 text-center space-y-2 opacity-40"><div class="dotted-slot"><i class="fas fa-plus text-gray-600 text-xs"></i></div><p class="text-[8px] text-gray-700 font-black uppercase tracking-widest">Empty</p></div>`;
            }

            // Main Grids
            allAnimeData.forEach(({title, item, slug, poster, banner, rating}) => {
                const isLiked = watchlist.includes(title), cat = item.category?.toLowerCase() || '', safeTitle = title.replace(/'/g, "\\'");
                const card = `
                    <div class="relative group flex flex-col cursor-pointer active-scale" onclick="openInfoModal('${safeTitle}', '${slug}', '${banner}', '${rating}')">
                        <div class="relative overflow-hidden rounded-[26px] shadow-2xl">
                            <img src="${poster}" class="anime-poster w-full group-hover:scale-110 transition duration-500">
                            <div class="absolute top-3 left-3 rating-chip px-2 py-1 rounded-lg text-[9px] text-white flex items-center gap-1 shadow-md"><i class="fas fa-star text-yellow-400"></i> ${rating}</div>
                            <button onclick="event.stopPropagation(); toggleWatchlist('${safeTitle}')" class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-black/40 backdrop-blur-md border border-white/10 z-10"><i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-regular text-white'} text-xs"></i></button>
                        </div>
                        <h4 class="text-[11px] font-black mt-4 truncate text-gray-400 px-1 uppercase tracking-tighter">${title}</h4>
                    </div>`;

                if (cat.includes('trending') || cat.includes('popular')) carousel.innerHTML += `<div class="w-36 flex-shrink-0">${card}</div>`;
                if (cat.includes('series') || cat === '' || cat.includes('latest')) series.innerHTML += card;
                if (cat.includes('movie')) movies.innerHTML += `<div class="bg-[#1e1f26] rounded-[35px] p-4 border border-white/5 active-scale" onclick="openInfoModal('${safeTitle}', '${slug}', '${banner}', '${rating}')"><div class="relative overflow-hidden rounded-2xl h-52"><img src="${poster}" class="w-full h-full object-cover shadow-lg"><div class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-black/40 backdrop-blur-md border border-white/10"><i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-regular text-white'} text-xs"></i></button></div><h4 class="text-xs font-black truncate mt-4 text-gray-200">${title}</h4></div>`;
            });
        }

        async function openInfoModal(title, slug, banner, rating) {
            document.body.classList.add('modal-open');
            const modal = document.getElementById(.getElementById('info-modal'), content = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-banner').src = banner;
            document.getElementById('modal-rating').innerHTML = `<i class="fas fa-star text-white text-[9px]"></i> ${rating}`;
            document.getElementById('modal-desc').innerText = "Loading details from Kitsu...";
            
            document.getElementById('modal-play-btn').onclick = () => location.href = `player.html?id=${slug}`;
            
            const updateFavBtn = (t) => {
                const watchlist = JSON.parse(localStorage.getItem('my_watchlist') || '[]');
                const isLiked = watchlist.includes(t);
                document.getElementById('modal-fav-btn').innerHTML = `<i class="fa-heart ${isLiked ? 'fa-solid text-[#ff4757]' : 'fa-solid text-white'}"></i>`;
                document.getElementById('modal-fav-btn').onclick = () => { toggleWatchlist(t); updateFavBtn(t); };
            };
            updateFavBtn(title);

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); content.classList.remove('translate-y-full'); }, 10);

            try {
                const res = await fetch(`https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(title)}&page[limit]=1`);
                const data = await res.json();
                if (data.data?.[0]) {
                    const attr = data.data[0].attributes;
                    document.getElementById('modal-desc').innerText = attr.synopsis || "No description available.";
                    document.getElementById('modal-status').innerText = attr.status.toUpperCase();
                }
            } catch (e) { console.log("Detail error"); }
        }

        function closeInfoModal() {
            document.body.classList.remove('modal-open');
            const modal = document.getElementById('info-modal'), content = document.getElementById('modal-content');
            modal.classList.remove('opacity-100');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 400);
        }

        function toggleWatchlist(t) {
            let l = JSON.parse(localStorage.getItem('my_watchlist') || '[]');
            l.includes(t) ? (l = l.filter(x => x !== t)) : l.push(t);
            localStorage.setItem('my_watchlist', JSON.stringify(l));
            renderGrids();
        }

        function handleSearch(q) {
            const box = document.getElementById('search-suggestions'), term = q.toLowerCase().trim();
            if(!term) { box.classList.add('hidden'); return; }
            const matches = allAnimeData.filter(a => a.title.toLowerCase().includes(term));
            if(matches.length > 0) {
                box.innerHTML = matches.map(a => `<div class="flex items-center gap-5 p-5 border-b border-white/5" onclick="openInfoModal('${a.title.replace(/'/g, "\\'")}', '${a.slug}', '${a.banner}', '${a.rating}')"><img src="${a.poster}" class="w-12 h-16 rounded-lg object-cover"><div class="flex-1"><p class="text-xs font-black text-gray-200 uppercase">${a.title}</p></div><i class="fas fa-info-circle text-[#ff4757]"></i></div>`).join('');
                box.classList.remove('hidden');
            } else { box.innerHTML = `<div class="p-8 text-center text-gray-600 font-black text-[10px] uppercase">No Result Found</div>`; box.classList.remove('hidden'); }
        }

        function toggleSearch() {
            const b = document.getElementById('search-box');
            if(b.classList.contains('hidden')) { b.classList.remove('hidden'); setTimeout(() => { b.classList.add('opacity-100'); b.classList.remove('-translate-y-6'); }, 10); document.getElementById('searchInput').focus(); }
            else { b.classList.remove('opacity-100'); b.classList.add('-translate-y-6'); setTimeout(() => b.classList.add('hidden'), 400); }
        }

        initApp();
    </script>
</body>
</html>
